<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Canva 가격표 갤러리 — Kimchi Mart</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0; font-family: -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
  background: #f5f5f7; color: #1a1a1a;
}
header {
  position: sticky; top: 0; z-index: 10;
  background: #1a5c3a; color: #fff;
  padding: 14px 22px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header .row { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
header h1 { margin: 0; font-size: 1.2em; font-weight: 800; letter-spacing: -.01em; }
header .stats { font-size: .85em; opacity: .85; }
header input {
  flex: 1; min-width: 240px; max-width: 400px;
  padding: 9px 14px; border: 0; border-radius: 8px;
  font-size: 1em; outline: none; font-family: inherit;
}
.controls {
  position: sticky; top: 56px; z-index: 9;
  background: #fff; border-bottom: 1px solid #e5e5e5; padding: 10px 22px;
  display: flex; gap: 10px; flex-wrap: wrap;
  font-size: .88em;
  box-shadow: 0 2px 6px rgba(0,0,0,.04);
}
.controls button {
  background: #f0f0f0; border: 1px solid #d4d4d4; border-radius: 6px;
  padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: .94em;
}
.controls button.active { background: #1a5c3a; color: #fff; border-color: #1a5c3a; }
main { max-width: 1400px; margin: 0 auto; padding: 18px 22px 60px; }
.design {
  background: #fff; border-radius: 12px; margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden;
}
.design header.dh {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 18px; cursor: pointer;
  background: #fff; color: #1a1a1a; box-shadow: none;
  border-bottom: 1px solid #f0f0f0;
}
.design header.dh:hover { background: #fafafa; }
.design header.dh .arrow { transition: transform .15s; }
.design.open header.dh .arrow { transform: rotate(90deg); }
.design .ti { font-weight: 800; font-size: 1.04em; flex: 1; }
.design .meta { font-size: .82em; color: #666; }
.pages {
  display: none;
  padding: 14px 18px;
  background: #fafafa;
}
.design.open .pages { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.page-card {
  background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
}
.page-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
.page-card img { display: block; width: 100%; aspect-ratio: 0.77; object-fit: cover; background: #f0f0f0; }
.page-card .lbl { padding: 5px 8px; font-size: .76em; color: #666; text-align: center; }

/* Lightbox */
.lb {
  position: fixed; inset: 0; background: #0a0a0a;
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 70px 30px 30px;
}
.lb.show { display: flex; }
.lb-stage {
  position: relative; max-width: 100%; max-height: calc(100vh - 80px);
  display: inline-block;
}
.lb-stage img { display: block; max-width: 100%; max-height: calc(100vh - 80px); border-radius: 8px; user-select: none; -webkit-user-drag: none; }
.lb-stage.editing { cursor: crosshair; }

/* Price overlay (covers old price, shows new) */
.ov {
  position: absolute;
  background: #fff;
  color: #dc2626;
  font-weight: 900;
  font-family: 'Arial Black', 'Arial', sans-serif;
  padding: .15em .3em;
  border-radius: 4px;
  box-shadow: 0 0 0 2px rgba(0,0,0,.05);
  white-space: nowrap;
  cursor: move;
  user-select: none;
  min-width: 1em;
  text-align: center;
  line-height: 1.05;
  letter-spacing: -.02em;
}
.ov.editing { outline: 2px dashed #fbbf24; }
.ov[contenteditable="true"]:focus { outline: 2px solid #fbbf24; }
.ov .del {
  position: absolute; top: -12px; right: -12px;
  width: 26px; height: 26px; border-radius: 50%;
  background: #dc2626; color: #fff; border: 2px solid #fff;
  font-size: 16px; line-height: 22px; cursor: pointer; padding: 0;
  display: none;
}
.ov .size {
  position: absolute; bottom: -12px; right: -12px;
  display: none;
  background: #1f1f1f; border-radius: 14px; padding: 2px;
  border: 2px solid #fff;
}
.ov .size button {
  width: 22px; height: 22px; border-radius: 50%;
  background: transparent; color: #fff; border: 0;
  font-size: 16px; font-weight: 900; cursor: pointer; padding: 0;
  line-height: 22px;
}
.ov .size button:hover { background: rgba(255,255,255,.2); }
.lb-stage.editing .ov .del,
.lb-stage.editing .ov .size { display: block; }
.lb-stage.editing .ov .size { display: flex; }

.lb .toolbar {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px;
  background: #1f1f1f; padding: 6px 10px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
}
.lb .toolbar button {
  background: rgba(255,255,255,.18); color: #fff; border: 0;
  padding: 7px 12px; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: .88em; font-weight: 700;
}
.lb .toolbar button:hover { background: rgba(255,255,255,.28); }
.lb .toolbar button.on { background: #fbbf24; color: #1a1a1a; }
.lb .x {
  position: absolute; top: 16px; right: 22px;
  background: rgba(255,255,255,.15); color: #fff; border: 0; border-radius: 50%;
  width: 38px; height: 38px; font-size: 1.6em; cursor: pointer; line-height: 1;
}
.lb .x:hover { background: rgba(255,255,255,.25); }
.lb .info {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.6); color: #fff; padding: 8px 16px; border-radius: 8px;
  font-size: .9em; backdrop-filter: blur(6px);
}
.lb .info b { color: #fde68a; }
.lb .nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.15); color: #fff; border: 0; border-radius: 50%;
  width: 50px; height: 50px; font-size: 1.6em; cursor: pointer;
}
.lb .nav:hover { background: rgba(255,255,255,.25); }
.lb .prev { left: 16px; }
.lb .next { right: 16px; }
.empty { text-align: center; color: #999; padding: 60px 20px; font-size: .9em; }

/* Category chips */
.cat-chip {
  display: inline-block; font-size: .68em; font-weight: 700; letter-spacing: .04em;
  padding: 2px 8px; border-radius: 99px; margin-right: 6px;
  text-transform: uppercase; vertical-align: middle;
}
.cat-vegetable { background: #d1fae5; color: #065f46; }
.cat-seafood   { background: #dbeafe; color: #1e3a8a; }
.cat-meat      { background: #fee2e2; color: #991b1b; }
.cat-kimchi    { background: #fef3c7; color: #78350f; }
.cat-freezer   { background: #e0e7ff; color: #3730a3; }
.cat-cooler    { background: #cffafe; color: #155e75; }
.cat-sale      { background: #fce7f3; color: #9d174d; }
.cat-other     { background: #f3f4f6; color: #374151; }

/* Star (favorite) overlay on page card */
.page-card { position: relative; }
.page-card .star {
  position: absolute; top: 6px; right: 6px;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,.5); color: #fff; border: 0; cursor: pointer;
  font-size: 1em; line-height: 28px; padding: 0;
  transition: transform .1s, background .1s;
}
.page-card .star:hover { transform: scale(1.1); }
.page-card .star.on { background: #fbbf24; color: #fff; }

/* Filter controls */
.filter-row {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  font-size: .85em;
}
.filter-row label { font-weight: 700; color: #555; }
.filter-row select {
  padding: 6px 10px; border: 1px solid #d4d4d4; border-radius: 6px;
  font-family: inherit; font-size: .94em; background: #fff;
}

/* Print cart (selection bag) */
.cart-toggle {
  background: #1a5c3a; color: #fff; border: 0; border-radius: 6px;
  padding: 6px 14px; cursor: pointer; font-family: inherit;
  font-size: .94em; font-weight: 700;
}
.cart-toggle.active { background: #b45309; }
.page-card .pick {
  position: absolute; top: 6px; left: 6px;
  width: 28px; height: 28px; border-radius: 6px;
  background: rgba(0,0,0,.55); color: #fff; border: 0; cursor: pointer;
  font-size: 1em; line-height: 28px; padding: 0; font-weight: 800;
  display: none;
}
body.pick-mode .page-card .pick { display: block; }
body.pick-mode .page-card { cursor: pointer; }
body.pick-mode .page-card .star { display: none; }
.page-card.picked { box-shadow: 0 0 0 3px #b45309 inset; }
.page-card.picked .pick { background: #b45309; }

/* Print bag floating panel */
.bag {
  position: fixed; right: 18px; bottom: 18px;
  background: #fff; border: 2px solid #1a5c3a; border-radius: 14px;
  box-shadow: 0 12px 32px rgba(0,0,0,.18);
  padding: 14px; min-width: 240px; max-width: 320px;
  z-index: 50; display: none;
}
.bag.show { display: block; }
.bag h3 { margin: 0 0 8px; font-size: 1em; color: #1a5c3a; font-weight: 800; }
.bag .items {
  max-height: 220px; overflow-y: auto;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
  margin-bottom: 10px;
}
.bag .items img { width: 100%; aspect-ratio: 0.77; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
.bag .actions { display: flex; gap: 6px; }
.bag .actions button {
  flex: 1; padding: 8px; border: 0; border-radius: 6px;
  font-family: inherit; font-size: .88em; font-weight: 700; cursor: pointer;
}
.bag .clear { background: #fee2e2; color: #991b1b; }
.bag .print { background: #1a5c3a; color: #fff; }
.bag .print:hover { background: #15803d; }
.bag-empty { color: #999; font-size: .85em; text-align: center; padding: 12px; }

/* Print layout — only visible when printing */
@media screen {
  #print-area { display: none; }
}
@media print {
  body > * { display: none !important; }
  body { background: #fff !important; }
  #print-area {
    display: block !important;
    margin: 0; padding: 0;
  }
  #print-area .pp-page {
    width: 100%; height: 100vh;
    page-break-after: always;
    display: flex; align-items: center; justify-content: center;
    padding: 8mm;
  }
  /* Each cell is a positioning context for overlays.
     container-type makes `cqw` units resolve to 1% of cell width — overlays
     scale with the cell at print time regardless of paper size or layout. */
  #print-area .cell {
    position: relative; display: inline-block; max-width: 100%; max-height: 100%;
    container-type: inline-size;
  }
  #print-area .cell img {
    display: block; max-width: 100%; max-height: 100%; object-fit: contain;
  }
  #print-area .print-ov {
    position: absolute;
    background: #fff; color: #dc2626;
    font-weight: 900; font-family: 'Arial Black', sans-serif;
    padding: 4px 10px; border-radius: 4px;
    white-space: nowrap; line-height: 1.1; letter-spacing: -.02em;
    transform: translate(-2px, -2px);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  /* Multiple-per-page layouts */
  #print-area.layout-1 .pp-page { display: flex; }
  #print-area.layout-1 .cell { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  #print-area.layout-2 .pp-page { display: grid; grid-template-rows: 1fr 1fr; gap: 4mm; }
  #print-area.layout-4 .pp-page { display: grid; grid-template: 1fr 1fr / 1fr 1fr; gap: 4mm; }
  #print-area.layout-6 .pp-page { display: grid; grid-template: 1fr 1fr 1fr / 1fr 1fr; gap: 3mm; }
  #print-area.layout-2 .cell,
  #print-area.layout-4 .cell,
  #print-area.layout-6 .cell {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
}

@media (max-width: 600px) {
  header h1 { font-size: 1em; }
  main { padding: 10px; }
  .design header.dh { padding: 10px 14px; }
}

<header>

<!-- Print bag (selection cart) -->
<div class="bag" id="bag">

  <div class="items" id="bagItems"></div>
  <div style="font-size:.82em;color:#444;margin-bottom:8px">
    레이아웃:
    <select id="layoutSel" style="padding:3px 6px;font-size:.94em">
      <option value="1">1장 / 페이지 (꽉차게)</option>
      <option value="2">2장 / 페이지 (위·아래)</option>
      <option value="4" selected>4장 / 페이지 (2×2)</option>
      <option value="6">6장 / 페이지 (3×2)</option>
    </select>
  </div>
  <div class="actions">
    <button class="clear" onclick="clearBag()">비우기</button>
    <button class="print" onclick="printBag()">🖨️ 인쇄</button>
  </div>
</div>

<!-- Print area (only visible during print) -->
<div id="print-area"></div>
<main id="main"></main>

<!-- Lightbox -->
<div class="lb" id="lb">
  <button class="x" onclick="closeLb()">×</button>
  <button class="nav prev" onclick="navLb(-1)">‹</button>
  <button class="nav next" onclick="navLb(1)">›</button>
  <div class="toolbar">
    <button id="btnEdit" onclick="toggleEdit()">✏️ 가격 수정</button>
    <button onclick="addOverlay()" id="btnAddOv" style="display:none">+ 새 가격 추가</button>
    <button onclick="clearOverlays()" id="btnClearOv" style="display:none">🗑️ 모두 삭제</button>
    <button onclick="toggleEdit(true)" id="btnDoneOv" style="display:none">✅ 완료</button>
  </div>
  <div class="lb-stage" id="lbStage">
    <img id="lbImg" alt="">
  </div>
  <div class="info" id="lbInfo"></div>
  <button id="lbFav" class="x" style="left:16px;right:auto;background:rgba(255,255,255,.15)" onclick="toggleLbFav()" title="즐겨찾기 (F)">★</button>
</div>

// Auto-categorize a design by its title keywords. Order matters — first match wins.
function categorize(title) {
  const t = (title || '').toLowerCase();
  if (/(kimchi)/.test(t) && !/mart/.test(t)) return 'kimchi';
  if (/(vegetable|veggie|야채|채소)/.test(t)) return 'vegetable';
  if (/(seafood|fish|수산|해산)/.test(t)) return 'seafood';
  if (/(meat|pork|beef|chicken|정육|sausage)/.test(t)) return 'meat';
  if (/(freezer|frozen|냉동|개)/.test(t)) return 'freezer';
  if (/(cooler|refrigerat|cold|냉장)/.test(t)) return 'cooler';
  if (/(sale|special|할인|on sale)/.test(t)) return 'sale';
  return 'other';
}
const CAT_LABELS = {
  vegetable: '🥬 야채', seafood: '🐟 수산', meat: '🥩 정육',
  kimchi: '🌶️ 김치', freezer: '❄️ 냉동', cooler: '🧊 냉장',
  sale: '🏷️ 세일', other: '📦 기타'
};

// localStorage-backed favorites: a Set of "designId:pageNum" strings
const FAVES_KEY = 'kmGalleryFaves';
function loadFaves() {
  try { return new Set(JSON.parse(localStorage.getItem(FAVES_KEY) || '[]')); }
  catch (e) { return new Set(); }
}
function saveFaves() {
  try { localStorage.setItem(FAVES_KEY, JSON.stringify([...FAVES])); }
  catch (e) {}
}
function favKey(designId, page) { return designId + ':' + page; }
let FAVES = loadFaves();

async function load() {
  DESIGNS = AVAILABLE_DESIGNS.map(d => ({ ...d, available: true, category: categorize(d.title) }));
  render();
  refreshBagUI();
}

function render() {
  const main = document.getElementById('main');
  const f = (document.getElementById('q').value || '').toLowerCase().trim();
  const cat = document.getElementById('catSel').value;
  const sort = document.getElementById('sortSel').value;

  // Special "favorites only" mode — show designs that have at least 1 favorited page
  const favesByDesign = {};
  if (cat === '__faves__') {
    for (const k of FAVES) {
      const [id] = k.split(':');
      favesByDesign[id] = (favesByDesign[id] || 0) + 1;
    }
  }

  let list = DESIGNS.filter(d => {
    if (!d.available) return false;
    if (f && !(d.title.toLowerCase().includes(f) || d.id.toLowerCase().includes(f))) return false;
    if (cat === '__faves__') return !!favesByDesign[d.id];
    if (cat && d.category !== cat) return false;
    return true;
  });

  // Sort
  list.sort((a, b) => {
    if (sort === 'title') return a.title.localeCompare(b.title);
    if (sort === 'pages-desc') return b.page_count - a.page_count;
    if (sort === 'pages-asc') return a.page_count - b.page_count;
    // Default: priority then page count desc
    return (a.priority - b.priority) || (b.page_count - a.page_count);
  });

  const total = list.reduce((s, d) => s + d.page_count, 0);
  const totalFaves = FAVES.size;
  const filterTag = (f || cat) ? ' (필터됨)' : '';
  document.getElementById('stats').textContent =
    `${list.length} 디자인 · ${total.toLocaleString()} 페이지${filterTag} · ⭐ ${totalFaves} 즐겨찾기`;

  if (list.length === 0) {
    main.innerHTML = '<div class="empty">결과 없음. 다른 필터/검색어를 시도해보세요.</div>';
    return;
  }
  main.innerHTML = list.map(d => `
    <div class="design" data-id="${d.id}">
      <header class="dh" onclick="toggleDesign(this.parentElement)">
        <span class="arrow">▶</span>
        <span class="cat-chip cat-${d.category}">${CAT_LABELS[d.category] || d.category}</span>
        <div class="ti">${escHtml(d.title)}</div>
        <div class="meta">${d.page_count}p · P${d.priority}${favesByDesign[d.id] ? ' · ⭐ ' + favesByDesign[d.id] : ''}</div>
      </header>
      <div class="pages" data-loaded="0"></div>
    </div>
  `).join('');
}

function toggleDesign(el) {
  el.classList.toggle('open');
  if (el.classList.contains('open')) loadPages(el);
}
function loadPages(el) {
  const container = el.querySelector('.pages');
  if (container.dataset.loaded === '1') return;
  const id = el.dataset.id;
  const d = DESIGNS.find(x => x.id === id);
  const onlyFaves = document.getElementById('catSel').value === '__faves__';
  const html = [];
  for (let i = 1; i <= d.page_count; i++) {
    const num = String(i).padStart(3, '0');
    const k = favKey(id, i);
    const starred = FAVES.has(k);
    if (onlyFaves && !starred) continue;
    const inBag = bagHas(id, i);
    html.push(`
      <div class="page-card${inBag ? ' picked' : ''}" data-page="${i}" onclick="onCardClick(event, '${id}', ${i})">
        <img loading="lazy" src="designs/${id}/p${num}.webp" alt="${escHtml(d.title)} p${num}">
        <button class="star${starred ? ' on' : ''}" onclick="toggleFav(event, '${id}', ${i})" title="즐겨찾기">★</button>
        <button class="pick" title="인쇄 모음에 추가">+</button>
        <div class="lbl">p${num}</div>
      </div>
    `);
  }
  container.innerHTML = html.join('') || '<div style="color:#999;font-size:.85em;padding:14px">즐겨찾기한 페이지 없음</div>';
  container.dataset.loaded = '1';
}

// In normal mode: click → lightbox. In pick-mode: click → toggle bag.
function onCardClick(e, id, page) {
  if (document.body.classList.contains('pick-mode')) {
    e.stopPropagation();
    toggleBagItem(id, page);
  } else {
    openLb(id, page);
  }
}

function toggleFav(e, id, page) {
  e.stopPropagation();
  const k = favKey(id, page);
  const card = e.currentTarget.closest('.page-card');
  if (FAVES.has(k)) {
    FAVES.delete(k);
    e.currentTarget.classList.remove('on');
  } else {
    FAVES.add(k);
    e.currentTarget.classList.add('on');
  }
  saveFaves();
  // Update header counter
  const totalFaves = FAVES.size;
  const stats = document.getElementById('stats');
  stats.textContent = stats.textContent.replace(/⭐ \d+ 즐겨찾기/, `⭐ ${totalFaves} 즐겨찾기`);
}

function openLb(designId, pageNum) {
  const d = DESIGNS.find(x => x.id === designId);
  LB_LIST = [];
  for (let i = 1; i <= d.page_count; i++) LB_LIST.push({ id: designId, title: d.title, page: i });
  LB_IDX = pageNum - 1;
  showLb();
  document.getElementById('lb').classList.add('show');
  document.body.style.overflow = 'hidden';   // prevent background scrolling
}
function showLb() {
  const item = LB_LIST[LB_IDX];
  if (!item) return;
  const num = String(item.page).padStart(3, '0');
  document.getElementById('lbImg').src = `designs/${item.id}/p${num}.webp`;
  document.getElementById('lbInfo').innerHTML =
    `<b>${escHtml(item.title)}</b> · 페이지 ${item.page} / ${LB_LIST.length}`;
  // Star button reflects current favorite state
  const k = favKey(item.id, item.page);
  const fav = document.getElementById('lbFav');
  if (FAVES.has(k)) {
    fav.style.background = '#fbbf24';
    fav.style.color = '#fff';
  } else {
    fav.style.background = 'rgba(255,255,255,.15)';
    fav.style.color = '#fff';
  }
  // Restore overlays for this page
  renderOverlaysOnStage(item.id, item.page);
  // Reset edit mode when navigating
  toggleEdit(false);
}
function toggleLbFav() {
  const item = LB_LIST[LB_IDX];
  if (!item) return;
  const k = favKey(item.id, item.page);
  if (FAVES.has(k)) FAVES.delete(k); else FAVES.add(k);
  saveFaves();
  showLb();
  // Update star on the underlying card if it's loaded
  const card = document.querySelector(`.design[data-id="${item.id}"] .page-card[data-page="${item.page}"] .star`);
  if (card) card.classList.toggle('on', FAVES.has(k));
  // Refresh stats
  const stats = document.getElementById('stats');
  stats.textContent = stats.textContent.replace(/⭐ \d+ 즐겨찾기/, `⭐ ${FAVES.size} 즐겨찾기`);
}
function closeLb() {
  document.getElementById('lb').classList.remove('show');
  document.body.style.overflow = '';
}
function navLb(dir) {
  LB_IDX = (LB_IDX + dir + LB_LIST.length) % LB_LIST.length;
  showLb();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('show')) return;
  if (e.key === 'Escape') closeLb();
  else if (e.key === 'ArrowLeft') navLb(-1);
  else if (e.key === 'ArrowRight') navLb(1);
  else if (e.key === 'f' || e.key === 'F') toggleLbFav();
});

document.getElementById('q').addEventListener('input', () => render());
document.getElementById('catSel').addEventListener('change', () => render());
document.getElementById('sortSel').addEventListener('change', () => render());

// === Price overlays (edit + persist + render at print) ===
// Stored as percent coordinates so they scale with image size.
// Schema: { 'designId:page': [{x:0..1, y:0..1, w:0..1, text:'$5.99'}, ...] }
const OV_KEY = 'kmGalleryOverlays';
let OVERLAYS = (() => {
  try { return JSON.parse(localStorage.getItem(OV_KEY) || '{}'); }
  catch (e) { return {}; }
})();
function saveOverlays() {
  try { localStorage.setItem(OV_KEY, JSON.stringify(OVERLAYS)); }
  catch (e) {}
}
function ovKey(id, page) { return id + ':' + page; }

function applyOverlayFontSize(el, ov, stage) {
  // fontSize is stored as a fraction of stage width (e.g. 0.10 = 10%)
  // so the overlay scales with the image automatically.
  const w = (stage || el.parentElement).clientWidth;
  const fs = (ov.fontSize || 0.10) * w;
  el.style.fontSize = fs + 'px';
}

function renderOverlaysOnStage(id, page) {
  const stage = document.getElementById('lbStage');
  // Remove existing overlay nodes
  [...stage.querySelectorAll('.ov')].forEach(n => n.remove());
  const list = OVERLAYS[ovKey(id, page)] || [];
  for (const ov of list) addOverlayNode(stage, ov);
}

function addOverlayNode(stage, ov) {
  const el = document.createElement('div');
  el.className = 'ov';
  el.style.left = (ov.x * 100) + '%';
  el.style.top = (ov.y * 100) + '%';
  el.innerHTML = `
    <span class="t">${escHtml(ov.text || '$0.00')}</span>
    <button class="del" title="삭제" onclick="deleteOverlay(this)">×</button>
    <div class="size">
      <button title="작게" onclick="resizeOverlay(this, -1)">−</button>
      <button title="크게" onclick="resizeOverlay(this, +1)">+</button>
    </div>`;
  el._data = ov;
  applyOverlayFontSize(el, ov, stage);
  // Drag (mouse)
  let dragging = false, sx=0, sy=0, ox=0, oy=0;
  el.addEventListener('mousedown', e => {
    if (!stage.classList.contains('editing')) return;
    if (e.target.tagName === 'BUTTON' || el.querySelector('.t').isContentEditable) return;
    dragging = true;
    sx = e.clientX; sy = e.clientY;
    const r = stage.getBoundingClientRect();
    ox = ov.x * r.width; oy = ov.y * r.height;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const r = stage.getBoundingClientRect();
    const nx = (ox + e.clientX - sx) / r.width;
    const ny = (oy + e.clientY - sy) / r.height;
    ov.x = Math.max(0, Math.min(.95, nx));
    ov.y = Math.max(0, Math.min(.95, ny));
    el.style.left = (ov.x * 100) + '%';
    el.style.top = (ov.y * 100) + '%';
  });
  document.addEventListener('mouseup', () => { if (dragging) { dragging = false; saveOverlays(); } });
  // Double-click to edit text
  const t = el.querySelector('.t');
  t.addEventListener('dblclick', () => {
    t.contentEditable = 'true';
    t.focus();
    document.execCommand('selectAll', false, null);
  });
  t.addEventListener('blur', () => {
    t.contentEditable = 'false';
    ov.text = t.textContent.trim() || '$0.00';
    saveOverlays();
  });
  t.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); t.blur(); }
  });
  stage.appendChild(el);
  return el;
}

function toggleEdit(forceOff) {
  const stage = document.getElementById('lbStage');
  const editing = (forceOff === true) ? false :
                  (forceOff === false) ? false :
                  !stage.classList.contains('editing');
  stage.classList.toggle('editing', editing);
  document.getElementById('btnEdit').classList.toggle('on', editing);
  document.getElementById('btnEdit').textContent = editing ? '🔒 편집 종료' : '✏️ 가격 수정';
  document.getElementById('btnAddOv').style.display = editing ? '' : 'none';
  document.getElementById('btnClearOv').style.display = editing ? '' : 'none';
  document.getElementById('btnDoneOv').style.display = editing ? '' : 'none';
  // Make existing overlays editable / not
  [...stage.querySelectorAll('.ov')].forEach(el => el.classList.toggle('editing', editing));
}

function addOverlay() {
  const item = LB_LIST[LB_IDX];
  if (!item) return;
  const k = ovKey(item.id, item.page);
  OVERLAYS[k] = OVERLAYS[k] || [];
  // Default: 12% of stage width (matches typical large price text in price tags).
  // Placed at center so the user just drags onto the old price.
  const ov = { x: 0.35, y: 0.40, text: '$0.00', fontSize: 0.12 };
  OVERLAYS[k].push(ov);
  saveOverlays();
  const node = addOverlayNode(document.getElementById('lbStage'), ov);
  node.classList.add('editing');
  // Auto-focus for typing
  setTimeout(() => {
    const t = node.querySelector('.t');
    t.contentEditable = 'true';
    t.focus();
    document.execCommand('selectAll', false, null);
  }, 50);
}

// Resize an overlay by stepping fontSize fraction up or down.
function resizeOverlay(btn, dir) {
  const el = btn.closest('.ov');
  const ov = el._data;
  const step = 0.015;       // ~1.5% of stage width per click
  const min = 0.04, max = 0.30;
  ov.fontSize = Math.max(min, Math.min(max, (ov.fontSize || 0.10) + dir * step));
  saveOverlays();
  applyOverlayFontSize(el, ov);
}

// Re-apply font sizes when the lightbox window resizes
window.addEventListener('resize', () => {
  const stage = document.getElementById('lbStage');
  if (!stage) return;
  [...stage.querySelectorAll('.ov')].forEach(el => applyOverlayFontSize(el, el._data, stage));
});

function clearOverlays() {
  const item = LB_LIST[LB_IDX];
  if (!item) return;
  const k = ovKey(item.id, item.page);
  if (!OVERLAYS[k] || OVERLAYS[k].length === 0) { alert('이 페이지엔 추가된 가격 박스가 없습니다.'); return; }
  if (!confirm(`이 페이지의 가격 박스 ${OVERLAYS[k].length}개를 모두 지울까요?`)) return;
  delete OVERLAYS[k];
  saveOverlays();
  renderOverlaysOnStage(item.id, item.page);
  toggleEdit(false);
  document.getElementById('lbStage').classList.add('editing');
  document.getElementById('btnEdit').classList.add('on');
}

function deleteOverlay(btn) {
  const el = btn.closest('.ov');
  const item = LB_LIST[LB_IDX];
  if (!item) return;
  const k = ovKey(item.id, item.page);
  const list = OVERLAYS[k] || [];
  const idx = list.indexOf(el._data);
  if (idx >= 0) list.splice(idx, 1);
  if (list.length === 0) delete OVERLAYS[k];
  saveOverlays();
  el.remove();
}

// === Print cart (selection bag) ===
const BAG_KEY = 'kmGalleryBag';
let BAG = (() => {
  try { return JSON.parse(localStorage.getItem(BAG_KEY) || '[]'); }
  catch (e) { return []; }
})();
function saveBag() {
  try { localStorage.setItem(BAG_KEY, JSON.stringify(BAG)); }
  catch (e) {}
  refreshBagUI();
}
function bagHas(id, page) {
  return BAG.some(it => it.id === id && it.page === page);
}
function toggleBagItem(id, page) {
  const idx = BAG.findIndex(it => it.id === id && it.page === page);
  if (idx >= 0) BAG.splice(idx, 1);
  else BAG.push({ id, page });
  saveBag();
  // Update card visual
  document.querySelectorAll(`.design[data-id="${id}"] .page-card[data-page="${page}"]`)
    .forEach(card => card.classList.toggle('picked', bagHas(id, page)));
}

function refreshBagUI() {
  const bag = document.getElementById('bag');
  document.getElementById('bagCount').textContent = `(${BAG.length})`;
  if (BAG.length === 0) {
    bag.classList.remove('show');
    return;
  }
  bag.classList.add('show');
  const items = document.getElementById('bagItems');
  items.innerHTML = BAG.map(it => {
    const num = String(it.page).padStart(3, '0');
    return `<img src="designs/${it.id}/p${num}.webp" title="${it.id} p${it.page} (클릭하면 빼기)" onclick="toggleBagItem('${it.id}', ${it.page})" style="cursor:pointer">`;
  }).join('');
}
function clearBag() {
  if (BAG.length === 0) return;
  if (!confirm(`인쇄 모음 ${BAG.length}장 모두 비우시겠어요?`)) return;
  BAG = [];
  saveBag();
  document.querySelectorAll('.page-card.picked').forEach(c => c.classList.remove('picked'));
}

// === Pick mode toggle ===
document.getElementById('pickToggle').addEventListener('click', () => {
  document.body.classList.toggle('pick-mode');
  document.getElementById('pickToggle').classList.toggle('active');
  // When entering pick mode, mark already-picked cards
  if (document.body.classList.contains('pick-mode')) {
    document.querySelectorAll('.page-card').forEach(card => {
      const designId = card.closest('.design').dataset.id;
      const page = parseInt(card.dataset.page, 10);
      card.classList.toggle('picked', bagHas(designId, page));
    });
  }
});

// === Print ===
function printBag() {
  if (BAG.length === 0) { alert('인쇄할 페이지가 없습니다. 먼저 페이지를 선택하세요.'); return; }
  const layout = parseInt(document.getElementById('layoutSel').value, 10) || 1;
  const area = document.getElementById('print-area');
  area.className = 'layout-' + layout;

  // Renders one cell: image + any saved overlays positioned over it.
  // fontSize is stored as a fraction of cell width — `em`-relative or `vw`
  // wouldn't work cleanly inside a flex layout, so we use the "cqw" container-
  // query unit (1cqw = 1% of container width). All evergreen browsers support it.
  function cellHtml(it) {
    const num = String(it.page).padStart(3, '0');
    const k = ovKey(it.id, it.page);
    const list = OVERLAYS[k] || [];
    const ovHtml = list.map(ov => {
      const frac = ov.fontSize || 0.10;
      const fs = (frac * 100).toFixed(2);   // → cqw units
      return `<div class="print-ov" style="left:${(ov.x*100).toFixed(2)}%;top:${(ov.y*100).toFixed(2)}%;font-size:${fs}cqw">${escHtml(ov.text||'')}</div>`;
    }).join('');
    return `<div class="cell"><img src="designs/${it.id}/p${num}.webp">${ovHtml}</div>`;
  }

  const html = [];
  for (let i = 0; i < BAG.length; i += layout) {
    const slice = BAG.slice(i, i + layout);
    const cells = slice.map(cellHtml).join('');
    html.push(`<div class="pp-page">${cells}</div>`);
  }
  area.innerHTML = html.join('');
  // Wait one tick so images start loading, then print
  setTimeout(() => {
    window.print();
  }, 400);
}
document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.design').forEach(el => {
    if (!el.classList.contains('open')) { el.classList.add('open'); loadPages(el); }
  });
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.design.open').forEach(el => el.classList.remove('open'));
});

function escHtml(s){return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
