<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearing Cache...</title>
<style>
body { display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:'Segoe UI',sans-serif; background:#F5F5F5; }
.box { text-align:center; padding:40px; }
.spinner { width:50px; height:50px; border:5px solid #ddd; border-top:5px solid #D32F2F; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="box">
<div class="spinner"></div>
<h2>캐시 삭제 중...</h2>
<p>잠시만 기다려주세요</p>
</div>
<script>
async function clearAndReload() {
  // Unregister all service workers
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const reg of regs) {
      await reg.unregister();
    }
  }
  // Clear all caches
  if ('caches' in window) {
    const keys = await caches.keys();
    for (const key of keys) {
      await caches.delete(key);
    }
  }
  // Clear localStorage SW version
  localStorage.removeItem('km_sw_ver');
  // Redirect to main app with cache bust
  window.location.href = './index.html?t=' + Date.now();
}
clearAndReload();
</script>
</body>
</html>
