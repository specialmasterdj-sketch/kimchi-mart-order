<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D32F2F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Kimchi Mart Order System</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --red:#D32F2F; --dark-red:#8B0000; --green:#388E3C; --blue:#1565C0;
  --bg:#F5F5F5; --white:#FFF; --gray:#E0E0E0; --dark:#333; --light-gray:#F9F9F9;
  --radius:12px; --shadow:0 2px 8px rgba(0,0,0,0.12);
}
body { font-family:'Segoe UI','Malgun Gothic',sans-serif; background:var(--bg); color:var(--dark); overflow-x:hidden; }
button { cursor:pointer; border:none; font-family:inherit; }
input { font-family:inherit; }

/* HEADER */
.header { background:var(--white); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow); position:sticky; top:0; z-index:100; }
.header h1 { font-size:20px; color:var(--dark); }
.header h1 small { font-size:13px; color:#888; display:block; }
.back-btn { background:none; font-size:28px; color:var(--dark); padding:8px 12px; border-radius:8px; }
.back-btn:active { background:var(--gray); }

/* HOME PAGE */
.home { padding:30px 20px; display:flex; flex-direction:column; align-items:center; min-height:90vh; justify-content:center; }
.home h2 { font-size:28px; margin-bottom:6px; }
.home p { color:#888; margin-bottom:30px; font-size:16px; }
.vendor-cards { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; width:100%; max-width:900px; }
.vendor-card { background:var(--white); border-radius:var(--radius); padding:30px 20px; text-align:center; box-shadow:var(--shadow); transition:transform 0.15s; border-top:5px solid; min-height:200px; display:flex; flex-direction:column; justify-content:center; }
.vendor-card:active { transform:scale(0.97); }
.vendor-card h3 { font-size:22px; margin-bottom:4px; }
.vendor-card .kr { font-size:14px; color:#888; margin-bottom:12px; }
.vendor-card .count { font-size:15px; color:#666; margin-bottom:8px; }
.vendor-card .cart-badge { display:inline-block; background:#FF6F00; color:#FFF; padding:4px 14px; border-radius:20px; font-size:14px; font-weight:600; }
.vendor-card .cart-badge.empty { background:var(--gray); color:#999; }
.vendor-card .tag { font-size:13px; color:#666; margin-bottom:8px; }
.home-actions { display:flex; gap:12px; margin-top:30px; }
.home-actions button { padding:14px 28px; border-radius:var(--radius); font-size:16px; font-weight:600; }
.btn-primary { background:var(--red); color:#FFF; }
.btn-secondary { background:var(--white); color:var(--dark); border:2px solid var(--gray); }

/* BROWSE PAGE */
.browse { display:flex; height:calc(100vh - 60px); }
.sidebar { width:200px; background:var(--white); overflow-y:auto; border-right:1px solid var(--gray); flex-shrink:0; }
.sidebar .cat-item { padding:14px 16px; font-size:14px; border-bottom:1px solid #F0F0F0; cursor:pointer; }
.sidebar .cat-item:active, .sidebar .cat-item.active { background:#FFF3E0; font-weight:700; }
.sidebar .cat-item .cat-count { float:right; color:#999; font-size:12px; }

.main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.search-bar { padding:10px 16px; background:var(--white); border-bottom:1px solid var(--gray); }
.search-bar input { width:100%; padding:12px 16px; border:2px solid var(--gray); border-radius:8px; font-size:16px; outline:none; }
.search-bar input:focus { border-color:var(--blue); }

.product-grid { flex:1; overflow-y:auto; padding:12px; display:grid; grid-template-columns:repeat(auto-fill, minmax(170px, 1fr)); gap:12px; align-content:start; }
.product-tile { background:var(--white); border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08); display:flex; flex-direction:column; min-height:280px; }
.product-tile .img-wrap { width:100%; height:150px; background:#F8F8F8; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.product-tile .img-wrap img { max-width:100%; max-height:100%; object-fit:contain; }
.product-tile .img-wrap .no-img { color:#CCC; font-size:40px; }
.product-tile .info { padding:8px 10px; flex:1; }
.product-tile .info .name { font-size:13px; font-weight:600; line-height:1.3; max-height:2.6em; overflow:hidden; }
.product-tile .info .name-kr { font-size:11px; color:#888; margin-top:2px; max-height:1.4em; overflow:hidden; }
.product-tile .info .meta { font-size:11px; color:#999; margin-top:4px; }
.product-tile .info .price { font-size:14px; font-weight:700; color:var(--red); margin-top:4px; }
.product-tile .qty-row { display:flex; align-items:center; justify-content:center; padding:8px; gap:0; border-top:1px solid #F0F0F0; }
.qty-btn { width:44px; height:44px; font-size:22px; font-weight:700; border-radius:8px; display:flex; align-items:center; justify-content:center; }
.qty-btn.minus { background:#FFEBEE; color:var(--red); }
.qty-btn.plus { background:#E8F5E9; color:var(--green); }
.qty-btn:active { opacity:0.7; }
.qty-input { width:56px; height:44px; text-align:center; font-size:20px; font-weight:700; border:2px solid var(--gray); border-radius:8px; margin:0 4px; }
.qty-input.has-qty { border-color:#FF6F00; background:#FFF8E1; color:#E65100; }

/* FLOATING ORDER BTN */
.float-order { position:fixed; bottom:20px; right:20px; background:var(--red); color:#FFF; padding:14px 24px; border-radius:30px; font-size:16px; font-weight:700; box-shadow:0 4px 16px rgba(0,0,0,0.25); z-index:99; display:flex; align-items:center; gap:8px; }
.float-order:active { transform:scale(0.95); }
.float-order .badge { background:#FFF; color:var(--red); width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; }

/* ORDER SUMMARY PAGE */
.order-page { padding:16px; max-width:900px; margin:0 auto; }
.order-page h2 { margin-bottom:16px; }
.order-table { width:100%; border-collapse:collapse; background:var(--white); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.order-table th { background:#424242; color:#FFF; padding:12px; text-align:left; font-size:14px; }
.order-table td { padding:10px 12px; border-bottom:1px solid #F0F0F0; font-size:14px; vertical-align:middle; }
.order-table tr:nth-child(even) { background:var(--light-gray); }
.order-table .item-img { width:50px; height:50px; object-fit:contain; border-radius:4px; }
.order-total { text-align:right; padding:16px; font-size:20px; font-weight:700; }

.action-bar { display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; justify-content:center; }
.action-bar button { padding:16px 28px; border-radius:var(--radius); font-size:16px; font-weight:600; min-width:180px; }
.btn-email { background:#1565C0; color:#FFF; }
.btn-excel { background:#2E7D32; color:#FFF; }
.btn-copy { background:#F57F17; color:#FFF; }
.btn-clear { background:#FFF; color:var(--red); border:2px solid var(--red); }
.btn-purple { background:#7B1FA2; color:#FFF; }

/* PROFESSIONAL ORDER FORM */
.of-wrap { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; margin-bottom:16px; }
.of-header { padding:20px 24px; border-bottom:3px solid var(--red); display:flex; justify-content:space-between; align-items:flex-start; }
.of-logo { font-size:24px; font-weight:700; color:var(--red); letter-spacing:1px; line-height:1.2; }
.of-logo-kr { color:#888; font-size:13px; font-weight:400; letter-spacing:0; }
.of-store { text-align:right; font-size:13px; color:#555; line-height:1.6; }
.of-store .bname { font-size:15px; font-weight:700; color:var(--dark); }
.of-title { background:#424242; color:#FFF; padding:12px 24px; display:flex; justify-content:space-between; align-items:center; }
.of-title h3 { font-size:17px; letter-spacing:2px; margin:0; font-weight:700; }
.of-title .meta { font-size:13px; text-align:right; line-height:1.7; }
.of-vendor { padding:14px 24px; background:#FAFAFA; border-bottom:1px solid var(--gray); display:flex; justify-content:space-between; align-items:flex-start; }
.of-label { font-size:11px; color:#999; text-transform:uppercase; margin-bottom:2px; }
.of-value { font-weight:700; font-size:16px; color:var(--dark); }
.of-table { width:100%; border-collapse:collapse; }
.of-table th { background:#F5F5F5; padding:10px 8px; text-align:left; font-size:11px; text-transform:uppercase; color:#666; border-bottom:2px solid #DDD; }
.of-table td { padding:8px; border-bottom:1px solid #F0F0F0; vertical-align:middle; font-size:13px; }
.of-table tr:nth-child(even) td { background:#FAFAFA; }
.of-thumb { width:45px; height:45px; object-fit:contain; border-radius:4px; border:1px solid #EEE; display:block; }
.of-no-thumb { width:45px; height:45px; background:#F8F8F8; border-radius:4px; display:flex; align-items:center; justify-content:center; color:#CCC; font-size:18px; border:1px solid #EEE; }
.of-item-name { font-weight:600; font-size:13px; line-height:1.3; }
.of-item-meta { font-size:11px; color:#999; margin-top:2px; }
.of-totals { padding:16px 24px; border-top:2px solid var(--gray); display:flex; justify-content:flex-end; }
.of-totals .trow { display:flex; justify-content:space-between; gap:40px; padding:4px 0; font-size:14px; }
.of-totals .trow span:last-child { font-weight:600; }
.of-totals .grand { font-size:20px; font-weight:700; color:var(--red); border-top:2px solid var(--dark); padding-top:10px; margin-top:6px; }
.of-footer { text-align:center; padding:14px; color:#888; font-size:13px; border-top:1px solid #F0F0F0; }

/* Store Settings Modal */
.settings-modal { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:300; display:none; align-items:center; justify-content:center; }
.settings-modal.show { display:flex; }
.settings-form { background:var(--white); border-radius:16px; padding:24px; width:420px; max-width:90vw; max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
.settings-form h3 { margin-bottom:16px; font-size:18px; }
.settings-form .field { margin-bottom:12px; }
.settings-form .field label { display:block; font-size:12px; color:#888; margin-bottom:4px; text-transform:uppercase; }
.settings-form .field input { width:100%; padding:10px 12px; border:2px solid var(--gray); border-radius:8px; font-size:15px; outline:none; box-sizing:border-box; }
.settings-form .field input:focus { border-color:var(--blue); }
.settings-form .s-actions { display:flex; gap:10px; margin-top:16px; }
.settings-form .s-actions button { flex:1; padding:12px; border-radius:8px; font-size:15px; font-weight:600; }

/* HISTORY PAGE */
.history-page { padding:20px; max-width:900px; margin:0 auto; }
.history-item { background:var(--white); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); display:flex; justify-content:space-between; align-items:center; }
.history-item .info h4 { font-size:16px; }
.history-item .info p { font-size:13px; color:#888; }
.history-item button { padding:10px 20px; border-radius:8px; background:#E3F2FD; color:var(--blue); font-weight:600; }

/* RESPONSIVE */
@media (max-width:600px) {
  .vendor-cards { grid-template-columns:1fr; max-width:400px; }
  .sidebar { width:140px; }
  .product-grid { grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); }
}
@media (orientation:portrait) {
  .sidebar { display:none; }
  .cat-tabs { display:flex !important; }
}
.cat-tabs { display:none; overflow-x:auto; white-space:nowrap; padding:8px 12px; background:var(--white); border-bottom:1px solid var(--gray); }
.cat-tabs .tab { display:inline-block; padding:8px 16px; border-radius:20px; font-size:13px; margin-right:6px; background:#F5F5F5; flex-shrink:0; }
.cat-tabs .tab.active { background:var(--red); color:#FFF; font-weight:600; }

/* TOAST */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#FFF; padding:12px 24px; border-radius:8px; font-size:14px; z-index:200; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }

/* NUMPAD MODAL */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:300; display:none; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.numpad { background:var(--white); border-radius:16px; padding:20px; width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
.numpad h3 { text-align:center; margin-bottom:8px; font-size:14px; }
.numpad .display { font-size:36px; text-align:center; padding:12px; background:#F5F5F5; border-radius:8px; margin-bottom:12px; min-height:60px; font-weight:700; }
.numpad .keys { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.numpad .key { height:56px; font-size:24px; font-weight:600; border-radius:8px; background:#F5F5F5; display:flex; align-items:center; justify-content:center; }
.numpad .key:active { background:var(--gray); }
.numpad .key.confirm { background:var(--green); color:#FFF; }
.numpad .key.del { background:#FFEBEE; color:var(--red); }
</style>
</head>
<body>

<div id="app"></div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="numpadModal">
  <div class="numpad">
    <h3 id="numpadTitle">Enter Quantity</h3>
    <div class="display" id="numpadDisplay">0</div>
    <div class="keys">
      <button class="key" onclick="numpadKey('1')">1</button>
      <button class="key" onclick="numpadKey('2')">2</button>
      <button class="key" onclick="numpadKey('3')">3</button>
      <button class="key" onclick="numpadKey('4')">4</button>
      <button class="key" onclick="numpadKey('5')">5</button>
      <button class="key" onclick="numpadKey('6')">6</button>
      <button class="key" onclick="numpadKey('7')">7</button>
      <button class="key" onclick="numpadKey('8')">8</button>
      <button class="key" onclick="numpadKey('9')">9</button>
      <button class="key del" onclick="numpadKey('del')">&#9003;</button>
      <button class="key" onclick="numpadKey('0')">0</button>
      <button class="key confirm" onclick="numpadConfirm()">&#10003;</button>
    </div>
  </div>
</div>

<div class="settings-modal" id="storeSettingsModal">
  <div class="settings-form">
    <h3>&#9881; Store Info / 지점 정보 설정</h3>
    <div class="field">
      <label>Branch Name / 지점명</label>
      <input id="sBranch" placeholder="e.g. Kimchi Mart - Main Branch">
    </div>
    <div class="field">
      <label>Address / 주소</label>
      <input id="sAddress" placeholder="e.g. 1234 Main St">
    </div>
    <div class="field">
      <label>City, State ZIP</label>
      <input id="sCity" placeholder="e.g. Los Angeles, CA 90001">
    </div>
    <div class="field">
      <label>Phone / 전화번호</label>
      <input id="sPhone" placeholder="e.g. (213) 555-1234">
    </div>
    <div class="field">
      <label>Fax / 팩스</label>
      <input id="sFax" placeholder="e.g. (213) 555-1235">
    </div>
    <div class="field">
      <label>Contact / 담당자</label>
      <input id="sContact" placeholder="e.g. John Kim">
    </div>
    <div class="s-actions">
      <button style="background:#E0E0E0;color:#333" onclick="closeStoreSettings()">Cancel</button>
      <button style="background:#D32F2F;color:#FFF" onclick="saveStoreSettingsForm()">Save / 저장</button>
    </div>
  </div>
</div>

<script src="products.js?v=20260410e"></script>
<script>
// ===== STATE =====
let state = {
  page: 'home',
  vendor: null,
  category: 'all',
  search: '',
  orders: {},
  history: JSON.parse(localStorage.getItem('km_history') || '[]')
};

// Load saved orders
try { state.orders = JSON.parse(localStorage.getItem('km_orders') || '{}'); } catch(e) { state.orders = {}; }
for (let v in VENDORS) { if (!state.orders[v]) state.orders[v] = {}; }

function saveState() {
  localStorage.setItem('km_orders', JSON.stringify(state.orders));
  localStorage.setItem('km_history', JSON.stringify(state.history));
}

// ===== STORE INFO =====
function getStoreInfo() {
  try { return JSON.parse(localStorage.getItem('km_store_info')) || {}; } catch(e) { return {}; }
}
function saveStoreInfo(info) {
  localStorage.setItem('km_store_info', JSON.stringify(info));
}
function openStoreSettings() {
  const s = getStoreInfo();
  document.getElementById('sBranch').value = s.branch || '';
  document.getElementById('sAddress').value = s.address || '';
  document.getElementById('sCity').value = s.city || '';
  document.getElementById('sPhone').value = s.phone || '';
  document.getElementById('sFax').value = s.fax || '';
  document.getElementById('sContact').value = s.contact || '';
  document.getElementById('storeSettingsModal').classList.add('show');
}
function closeStoreSettings() {
  document.getElementById('storeSettingsModal').classList.remove('show');
}
function saveStoreSettingsForm() {
  const info = {
    branch: document.getElementById('sBranch').value.trim(),
    address: document.getElementById('sAddress').value.trim(),
    city: document.getElementById('sCity').value.trim(),
    phone: document.getElementById('sPhone').value.trim(),
    fax: document.getElementById('sFax').value.trim(),
    contact: document.getElementById('sContact').value.trim()
  };
  saveStoreInfo(info);
  closeStoreSettings();
  showToast('Store info saved! / 저장되었습니다!');
  if (state.page === 'order') render();
}
document.getElementById('storeSettingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeStoreSettings();
});

function getOrderCount(vendorId) {
  const o = state.orders[vendorId] || {};
  return Object.values(o).filter(q => q > 0).length;
}

function getOrderTotal(vendorId) {
  const o = state.orders[vendorId] || {};
  const vendor = VENDORS[vendorId];
  let total = 0;
  for (let id in o) {
    if (o[id] > 0) {
      const p = vendor.products.find(p => p.id === id);
      if (p && p.price) total += p.price * o[id];
    }
  }
  return total;
}

function setQty(vendorId, productId, qty) {
  if (!state.orders[vendorId]) state.orders[vendorId] = {};
  state.orders[vendorId][productId] = Math.max(0, parseInt(qty) || 0);
  if (state.orders[vendorId][productId] === 0) delete state.orders[vendorId][productId];
  saveState();
  // Update only the changed product's qty display instead of full re-render
  if (state.page === 'browse') {
    const newQty = getQty(vendorId, productId);
    const tiles = document.querySelectorAll('.product-tile');
    for (const tile of tiles) {
      const input = tile.querySelector('.qty-input');
      if (!input) continue;
      const onclickAttr = input.getAttribute('onclick') || '';
      if (onclickAttr.includes("'" + productId + "'")) {
        input.value = newQty;
        input.className = 'qty-input' + (newQty > 0 ? ' has-qty' : '');
        // Update the minus/plus button onclick values
        const minus = tile.querySelector('.minus');
        const plus = tile.querySelector('.plus');
        if (minus) minus.setAttribute('onclick', "event.stopPropagation();setQty('" + vendorId + "','" + productId + "'," + (newQty-1) + ")");
        if (plus) plus.setAttribute('onclick', "event.stopPropagation();setQty('" + vendorId + "','" + productId + "'," + (newQty+1) + ")");
        // Update numpad onclick
        const pName = (input.getAttribute('onclick') || '').match(/,'([^']*)'\)/);
        input.setAttribute('onclick', "openNumpad('" + vendorId + "','" + productId + "'," + newQty + ",'" + (pName ? pName[1] : '') + "')");
        break;
      }
    }
    // Update floating order button
    const orderCount = getOrderCount(vendorId);
    const existing = document.querySelector('.float-order');
    const v = VENDORS[vendorId];
    if (orderCount > 0) {
      if (existing) {
        existing.querySelector('.badge').textContent = orderCount;
      } else {
        const btn = document.createElement('button');
        btn.className = 'float-order';
        btn.style.background = v.color;
        btn.innerHTML = 'View Order <span class="badge">' + orderCount + '</span>';
        btn.onclick = function() { state.page='order'; render(); };
        document.getElementById('app').appendChild(btn);
      }
    } else if (existing) {
      existing.remove();
    }
  } else {
    render();
  }
}

function getQty(vendorId, productId) {
  return (state.orders[vendorId] || {})[productId] || 0;
}

// ===== NUMPAD =====
let numpadTarget = null;
function openNumpad(vendorId, productId, currentQty, productName) {
  numpadTarget = { vendorId, productId };
  document.getElementById('numpadDisplay').textContent = currentQty > 0 ? String(currentQty) : '0';
  document.getElementById('numpadTitle').textContent = productName.substring(0, 30);
  document.getElementById('numpadModal').classList.add('show');
}
function numpadKey(k) {
  const d = document.getElementById('numpadDisplay');
  if (k === 'del') { d.textContent = d.textContent.length > 1 ? d.textContent.slice(0,-1) : '0'; }
  else { d.textContent = d.textContent === '0' ? k : d.textContent + k; }
}
function numpadConfirm() {
  const qty = parseInt(document.getElementById('numpadDisplay').textContent) || 0;
  if (numpadTarget) setQty(numpadTarget.vendorId, numpadTarget.productId, qty);
  document.getElementById('numpadModal').classList.remove('show');
  numpadTarget = null;
}
document.getElementById('numpadModal').addEventListener('click', function(e) {
  if (e.target === this) { this.classList.remove('show'); numpadTarget = null; }
});

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== RENDER =====
function render() {
  const scrollPos = window.scrollY;
  const app = document.getElementById('app');
  if (state.page === 'home') renderHome(app);
  else if (state.page === 'browse') renderBrowse(app);
  else if (state.page === 'order') renderOrder(app);
  else if (state.page === 'history') renderHistory(app);
  requestAnimationFrame(() => window.scrollTo(0, scrollPos));
}

function renderHome(app) {
  let cards = '';
  const vendorTags = { rhee_frequent: '\u2B50 \uC790\uC8FC \uC8FC\uBB38', rhee_full: '\uD83D\uDCCB \uC804\uCCB4 \uCE74\uD0C8\uB85C\uADF8' };
  for (let vid in VENDORS) {
    const v = VENDORS[vid];
    const cnt = getOrderCount(vid);
    const badge = cnt > 0 ? `<span class="cart-badge">${cnt} items in cart</span>` : `<span class="cart-badge empty">Empty</span>`;
    const tag = vendorTags[vid] ? `<div class="tag">${vendorTags[vid]}</div>` : '';
    cards += `<div class="vendor-card" style="border-color:${v.color}" onclick="state.vendor='${vid}';state.category='all';state.search='';state.page='browse';render()">

      <div class="home-actions">

function renderBrowse(app) {
  const v = VENDORS[state.vendor];
  if (!v) { state.page='home'; render(); return; }

  // Filter products
  let products = v.products;
  if (state.category !== 'all') products = products.filter(p => p.category === state.category);
  if (state.search) {
    const q = state.search.toLowerCase();
    products = products.filter(p =>
      (p.name||'').toLowerCase().includes(q) || (p.nameKr||'').toLowerCase().includes(q) ||
      (p.id||'').toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q)
    );
  }

  // Sidebar categories
  let sideItems = `<div class="cat-item ${state.category==='all'?'active':''}" onclick="state.category='all';render()">All Items <span class="cat-count">${v.products.length}</span></div>`;
  let tabs = `<button class="tab ${state.category==='all'?'active':''}" onclick="state.category='all';render()">All</button>`;
  for (let c of v.categories) {
    const cnt = v.products.filter(p => p.category === c.id).length;
    sideItems += `<div class="cat-item ${state.category===c.id?'active':''}" onclick="state.category='${c.id}';render()">${c.name} <span class="cat-count">${cnt}</span></div>`;
    tabs += `<button class="tab ${state.category===c.id?'active':''}" onclick="state.category='${c.id}';render()">${c.name}</button>`;
  }

  // Product tiles
  let tiles = '';
  for (let p of products) {
    const qty = getQty(state.vendor, p.id);
    const imgHtml = p.image ? `<img src="${p.image}" loading="lazy" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=no-img>&#128230;</div>'">` : '<div class="no-img">&#128230;</div>';
    const priceHtml = p.price ? `<div class="price">$${p.price.toFixed(2)}</div>` : '';
    tiles += `<div class="product-tile">
      <div class="img-wrap">${imgHtml}</div>
      <div class="info">
        <div class="name">${p.name || p.nameKr}</div>
        ${p.nameKr && p.name ? `<div class="name-kr">${p.nameKr}</div>` : ''}
        <div class="meta">${p.id} | ${p.size || ''}</div>
        ${priceHtml}
      </div>
      <div class="qty-row">
        <button class="qty-btn minus" onclick="event.stopPropagation();setQty('${state.vendor}','${p.id}',${qty-1})">-</button>
        <input class="qty-input ${qty>0?'has-qty':''}" type="text" inputmode="numeric" value="${qty}" readonly onclick="openNumpad('${state.vendor}','${p.id}',${qty},'${(p.name||p.nameKr||'').replace(/'/g,'')}')">
        <button class="qty-btn plus" onclick="event.stopPropagation();setQty('${state.vendor}','${p.id}',${qty+1})">+</button>
      </div>
    </div>`;

  const orderCount = getOrderCount(state.vendor);
  const floatBtn = orderCount > 0 ? `<button class="float-order" style="background:${v.color}" onclick="state.page='order';render()">View Order <span class="badge">${orderCount}</span></button>` : '';

  app.innerHTML = `
    <div class="header">
      <button class="back-btn" onclick="state.page='home';render()">&larr;</button>
      <h1 style="color:${v.color}">${v.name}<small>${v.nameKr}</small></h1>
      <button class="back-btn" onclick="state.page='order';render()">&#128722;</button>
    </div>
    <div class="browse">

        <div class="cat-tabs">${tabs}</div>

        <div class="product-grid">${tiles}</div>

function formatOrderText() {
  const v = VENDORS[state.vendor];
  const store = getStoreInfo();
  const orders = state.orders[state.vendor] || {};
  const items = Object.entries(orders).filter(([_,q]) => q > 0).map(([id,qty]) => {
    const p = v.products.find(p => p.id === id) || { id, name:'Unknown', size:'', price:0 };
    return { ...p, orderQty: qty };
  });
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  const orderNum = 'KM-' + today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');

  let text = '═══════════════════════════════════════════════════\n';
  text += '  KIMCHI MART / 김치마트 - PURCHASE ORDER\n';
  text += '═══════════════════════════════════════════════════\n\n';
  if (store.branch) text += `  Store: ${store.branch}\n`;
  if (store.address) text += `  Address: ${store.address}\n`;
  if (store.city) text += `  ${store.city}\n`;
  if (store.phone) text += `  Tel: ${store.phone}\n`;
  text += `\n  Vendor: ${v.name} (${v.nameKr})\n`;
  text += `  Date: ${dateStr}\n`;
  text += `  Order #: ${orderNum}\n\n`;
  text += '───────────────────────────────────────────────────\n';
  text += `  ${'#'.padEnd(4)}${'Item#'.padEnd(10)}${'Product'.padEnd(30)}${'Size'.padEnd(12)}${'Qty'.padEnd(5)}\n`;
  text += '───────────────────────────────────────────────────\n';
  let total = 0;
  items.forEach((it, i) => {
    const lineTotal = (it.price||0) * it.orderQty;
    total += lineTotal;
    text += `  ${String(i+1).padEnd(4)}${(it.id||'').padEnd(10)}${(it.name||it.nameKr||'').substring(0,28).padEnd(30)}${(it.size||'').substring(0,10).padEnd(12)}${String(it.orderQty).padEnd(5)}\n`;
  });
  text += '───────────────────────────────────────────────────\n';
  text += `  Total Items: ${items.length}\n`;
  text += `  Total Quantity: ${items.reduce((s,it)=>s+it.orderQty,0)}\n`;
  if (total > 0) text += `  Grand Total: $${total.toFixed(2)}\n`;
  text += '\n═══════════════════════════════════════════════════\n';
  text += '  Thank you! / 감사합니다!\n';
  text += '  KIMCHI MART\n';
  return text;
}

function printOrder() {
  const v = VENDORS[state.vendor];
  const html = generateOrderHTML();
  const printHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Order - '+v.name+'</title>' +
    '<style>body{margin:0;padding:25px;font-family:Segoe UI,Malgun Gothic,sans-serif}@media print{body{padding:15px}@page{margin:12mm}}</style>' +
    '</head><body>'+html+'</body></html>';
  const w = window.open('', '_blank');
  if (!w) { showToast('Popup blocked! Allow popups.'); return; }
  w.document.write(printHtml);
  w.document.close();
  setTimeout(function(){ w.print(); }, 800);
}

function copyHtmlOrder() {
  const html = generateOrderHTML();
  const plain = formatOrderText();
  if (navigator.clipboard && navigator.clipboard.write) {
    navigator.clipboard.write([new ClipboardItem({
      'text/html': new Blob([html], {type:'text/html'}),
      'text/plain': new Blob([plain], {type:'text/plain'})
    })]).then(function(){
      showToast('Order copied! Paste into email. / 이메일에 붙여넣기 하세요!');
    }).catch(function(){
      navigator.clipboard.writeText(plain).then(function(){
        showToast('Text copied! Paste into email.');
      });
    });
  } else {
    navigator.clipboard.writeText(plain).then(function(){
      showToast('Text copied! Paste into email.');
    }).catch(function(){
      const ta = document.createElement('textarea');
      ta.value = plain; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); showToast('Order copied!');
    });
  }
}

function emailOrder() {
  const v = VENDORS[state.vendor];
  const store = getStoreInfo();
  const storeName = store.branch || 'Kimchi Mart';
  const subject = `Purchase Order - ${storeName} to ${v.name} - ${new Date().toLocaleDateString('en-US')}`;
  const body = formatOrderText();
  const mailto = `mailto:${v.email||''}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;

  // Save to history
  const orders = state.orders[state.vendor] || {};
  const items = Object.entries(orders).filter(([_,q]) => q > 0);
  state.history.unshift({
    vendor: v.name, date: new Date().toLocaleDateString('en-US'),
    count: items.length, total: getOrderTotal(state.vendor),
    items: { ...orders }
  });
  if (state.history.length > 20) state.history = state.history.slice(0, 20);
  saveState();
  showToast('Order sent! Check your email app.');
}

function copyOrder() {
  copyHtmlOrder();
}

function downloadCSV() {
  const v = VENDORS[state.vendor];
  const orders = state.orders[state.vendor] || {};
  const items = Object.entries(orders).filter(([_,q]) => q > 0).map(([id,qty]) => {
    const p = v.products.find(p => p.id === id) || { id, name:'', size:'', price:0 };
    return { ...p, orderQty: qty };
  });
  let csv = 'Item#,Product,Size,Qty,Price,Total\n';
  items.forEach(it => {
    const name = (it.name||it.nameKr||'').replace(/,/g,' ');
    csv += `${it.id},"${name}",${it.size||''},${it.orderQty},${it.price||0},${((it.price||0)*it.orderQty).toFixed(2)}\n`;
  });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `KimchiMart_Order_${v.name.replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV downloaded!');
}

function reorder(idx) {
  const h = state.history[idx];
  if (!h || !h.items) return;
  const vendorId = Object.keys(VENDORS).find(k => VENDORS[k].name === h.vendor);
  if (vendorId) {
    state.orders[vendorId] = { ...h.items };
    state.vendor = vendorId;
    state.page = 'browse';
    saveState();
    render();
    showToast('Previous order loaded!');
  }
}

// ===== PWA INSTALL =====
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#1B5E20;color:#FFF;padding:14px 20px;z-index:999;display:flex;justify-content:space-between;align-items:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.3)';
  banner.innerHTML = '<span>Install this app for offline use!</span><div><button onclick="installApp()" style="background:#FFF;color:#1B5E20;border:none;padding:10px 20px;border-radius:8px;font-weight:700;font-size:14px;margin-right:8px">INSTALL</button><button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:#FFF;font-size:20px;padding:4px 8px">&times;</button></div>';
  document.body.prepend(banner);
}

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result => {
    if (result.outcome === 'accepted') showToast('App installed!');
    deferredPrompt = null;
    document.getElementById('installBanner')?.remove();
  });
}

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered');
    // Force check for updates on every page load
    reg.update();
    // When new SW is waiting, activate it immediately
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'activated') {
          window.location.reload();
        }
      });
    });
  }).catch(err => console.log('SW failed', err));
}

// ===== INIT =====
render();
</script>
