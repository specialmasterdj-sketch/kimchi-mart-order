<html lang="ko">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f5f6f8;
    color: #1a1a1a;
    font-size: 15px;
    padding-bottom: 140px;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: #1f2937; color: #fff;
    padding: 14px 16px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
  h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: -0.3px; }
  .meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .branch-btn {
    flex-shrink: 0;
    background: #374151; color: #fff;
    border: 1px solid #4b5563;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
    transition: background .15s;
  }
  .branch-btn:active, .branch-btn:hover { background: #4b5563; }
  .branch-btn .caret { font-size: 10px; opacity: 0.8; }
  .branch-btn.unset { background: #dc2626; border-color: #ef4444; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.4); } 50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); } }
  .tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 10px 14px;
    background: transparent;
    color: #9ca3af;
    border: none;
    border-bottom: 3px solid transparent;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .tab.active { color: #fff; border-bottom-color: #22c55e; }
  .tab:disabled { opacity: 0.35; cursor: not-allowed; }

  .controls {
    position: sticky; top: 95px; z-index: 9;
    background: #f5f6f8;
    padding: 12px 16px 8px;
    border-bottom: 1px solid #e5e7eb;
  }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap input {
    width: 100%;
    padding: 11px 36px 11px 14px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 15px;
    background: #fff;
    outline: none;
  }
  .search-wrap input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.15); }
  .search-clear {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: #e5e7eb; border: none; border-radius: 50%;
    width: 24px; height: 24px; cursor: pointer;
    display: none; font-size: 13px; color: #4b5563;
  }
  .search-clear.show { display: flex; align-items: center; justify-content: center; }

  .subcats { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .subcats::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    padding: 6px 12px;
    border: 1px solid #d1d5db;
    background: #fff;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    cursor: pointer;
    white-space: nowrap;
  }
  .chip.active { background: #1f2937; color: #fff; border-color: #1f2937; }
  .chip .count { opacity: 0.6; margin-left: 4px; font-size: 11px; }

  main { padding: 8px 10px 16px; }
  .subcat-header {
    font-size: 12px; font-weight: 700; color: #6b7280;
    margin: 12px 0 6px; padding-left: 2px;
  }
  .subcat-header:first-child { margin-top: 0; }

  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
    gap: 5px;
    margin-bottom: 4px;
  }

  .item {
    background: #fff;
    padding: 7px 9px 6px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
    transition: border-color .1s, box-shadow .1s;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .item.has-qty { border-color: #22c55e; box-shadow: 0 0 0 1px #22c55e inset; }
  .item-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; min-width: 0; }
  .name-en {
    font-weight: 700; font-size: 13px; line-height: 1.25; color: #111827;
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .name-ko {
    font-weight: 500; font-size: 13px; line-height: 1.25; color: #4b5563;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .plu { font-family: "SF Mono", Menlo, Consolas, monospace; color: #9ca3af; font-size: 11px; flex-shrink: 0; white-space: nowrap; }
  .item-foot { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; margin-top: auto; padding-top: 4px; }
  .unit { color: #6b7280; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .price { font-weight: 800; color: #059669; font-size: 13px; flex-shrink: 0; display: inline-flex; align-items: baseline; }
  .price-input {
    border: none; background: transparent;
    font-weight: 800; color: #059669; font-size: 13px;
    field-sizing: content;
    min-width: 1ch;
    text-align: left;
    padding: 0;
    font-family: inherit;
    -moz-appearance: textfield;
    cursor: text;
  }
  .price-input:hover { background: #f9fafb; border-radius: 3px; }
  .price-input:focus {
    outline: none;
    background: #fff;
    border: 1px solid #22c55e;
    border-radius: 3px;
    padding: 0 1px;
  }
  .price-input::-webkit-outer-spin-button,
  .price-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .price.edited .price-input { color: #d97706; }
  .qty-control {
    display: flex; align-items: center;
    background: #f3f4f6; border-radius: 6px; padding: 2px;
    margin-top: 4px;
  }
  .qty-btn {
    width: 26px; height: 26px; flex-shrink: 0;
    border: none; background: #fff;
    border-radius: 4px; font-size: 15px; font-weight: 700;
    color: #374151; cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
  }
  .qty-btn:active { background: #e5e7eb; }
  .qty-input {
    flex: 1; height: 26px; text-align: center;
    border: none; background: transparent;
    font-size: 13px; font-weight: 700; color: #111827;
    outline: none; padding: 0; min-width: 0;
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: #9ca3af; font-size: 14px;
  }

  .summary-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #e5e7eb;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 -2px 12px rgba(0,0,0,.08);
    z-index: 20;
  }
  .summary-info { flex: 1; }
  .summary-label { font-size: 11px; color: #6b7280; }
  .summary-total { font-size: 20px; font-weight: 800; color: #111827; letter-spacing: -0.3px; }
  .summary-count { font-size: 12px; color: #4b5563; margin-left: 6px; }
  .btn-primary {
    padding: 12px 22px; border: none; border-radius: 10px;
    background: #22c55e; color: #fff;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
  }
  .btn-primary:disabled { background: #d1d5db; cursor: not-allowed; }
  .btn-primary:active:not(:disabled) { background: #16a34a; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 520px;
    max-height: 85vh;
    border-radius: 16px 16px 0 0;
    display: flex; flex-direction: column;
    animation: slideUp .2s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @media (min-width: 600px) {
    .modal-backdrop { align-items: center; }
    .modal { border-radius: 16px; margin: 20px; }
  }
  .modal-header {
    padding: 16px 18px; border-bottom: 1px solid #e5e7eb;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h2 { margin: 0; font-size: 17px; }
  .close-btn {
    background: transparent; border: none; font-size: 24px;
    color: #6b7280; cursor: pointer; padding: 0 4px;
    line-height: 1;
  }
  .modal-body { flex: 1; overflow-y: auto; padding: 12px 18px; }
  .order-line {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px;
    padding: 10px 0;
    border-bottom: 1px solid #f3f4f6;
    font-size: 14px;
  }
  .order-line:last-child { border-bottom: none; }
  .ol-name { font-weight: 600; }
  .ol-detail { font-size: 12px; color: #6b7280; margin-top: 2px; }
  .ol-qty { font-weight: 700; text-align: right; }
  .ol-sub { font-size: 12px; color: #6b7280; text-align: right; margin-top: 2px; }
  .modal-footer {
    padding: 14px 18px; border-top: 1px solid #e5e7eb;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .modal-footer .total-row {
    grid-column: 1 / -1;
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px;
  }
  .modal-footer .total-row .label { font-size: 13px; color: #6b7280; font-weight: 600; }
  .modal-footer .total-row .total { font-size: 18px; font-weight: 800; color: #111827; }
  .btn {
    padding: 11px 10px; border: 1px solid #d1d5db; border-radius: 10px;
    background: #fff; color: #374151;
    font-size: 14px; font-weight: 700; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn:active { background: #f3f4f6; }
  .btn.danger { color: #dc2626; border-color: #fecaca; background: #fff; }
  .btn.primary { background: #dc2626; color: #fff; border-color: #dc2626; }
  .btn.primary:active { background: #b91c1c; }
  .btn .icon { font-size: 15px; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #111827; color: #fff; padding: 10px 18px;
    border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
    z-index: 200;
  }
  .toast.show { opacity: 0.95; }

  .placeholder {
    text-align: center; padding: 60px 24px;
    color: #9ca3af;
  }
  .placeholder .emoji { font-size: 48px; margin-bottom: 12px; }
  .placeholder .hint { font-size: 13px; margin-top: 8px; }

  /* Branch selector modal */
  .branch-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    padding: 4px 0;
  }
  .branch-card {
    padding: 18px 12px;
    border: 2px solid #e5e7eb; border-radius: 12px;
    background: #fff; cursor: pointer;
    text-align: center;
    transition: all .12s;
  }
  .branch-card:hover, .branch-card:active { border-color: #dc2626; background: #fef2f2; }
  .branch-card.current { border-color: #22c55e; background: #f0fdf4; }
  .branch-card .bko { font-weight: 700; font-size: 15px; color: #111827; }
  .branch-card .ben { font-size: 11px; color: #6b7280; margin-top: 3px; letter-spacing: 0.3px; }
  .branch-card .badge { font-size: 10px; color: #22c55e; font-weight: 600; margin-top: 4px; }

  @media print {
    header, .controls, .summary-bar, .modal-footer, .close-btn { display: none !important; }
    .modal-backdrop { position: static; background: none; }
    .modal { max-height: none; box-shadow: none; }
  }
</style>
</head>
<body>

<header>
  <div class="title-row">
    <div>
      <h1>Namdaemun Vendor Order</h1>
      <div class="meta">남대문 벤더 주문서 · Prices as of <span id="priceDate">2026-04-21</span> <span id="priceEditedCount" style="color:#fbbf24"></span></div>
    </div>
    <button class="branch-btn unset" id="branchBtn" type="button">
      <span id="branchLabel">지점 선택</span>
      <span class="caret">▼</span>
    </button>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="controls" id="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search items / 품목 검색 (EN · KO · PLU)" autocomplete="off">
    <button class="search-clear" id="searchClear" aria-label="지우기">×</button>
  </div>
  <div class="subcats" id="subcats"></div>
</div>

<main id="content"></main>

<div class="summary-bar">
  <div class="summary-info">
    <div class="summary-label">Order / 주문 수량</div>
    <div>
      <span class="summary-total" id="totalCount">0 items</span>
      <span class="summary-count" id="totalUnits"></span>
    </div>
  </div>
  <button class="btn-primary" id="openOrderBtn" disabled>View / 주문서 보기</button>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Order / 주문 내역</h2>
      <button class="close-btn" id="closeModal">×</button>
    </div>
    <div class="modal-body" id="orderList"></div>
    <div class="modal-footer">
      <div class="total-row">
        <span class="label" id="modalBranch">No branch / 지점 미선택</span>
        <span class="total" id="modalTotal">0 items · 0 units</span>
      </div>
      <button class="btn danger" id="clearBtn"><span class="icon">🗑️</span>Clear 비우기</button>
      <button class="btn" id="excelBtn"><span class="icon">📊</span>Excel 엑셀</button>
      <button class="btn" id="emailBtn"><span class="icon">✉️</span>Email 이메일</button>
      <button class="btn primary" id="copyBtn"><span class="icon">📋</span>Copy 복사</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="branchModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Select Branch / 지점 선택</h2>
      <button class="close-btn" id="closeBranchModal">×</button>
    </div>
    <div class="modal-body">
      <div style="font-size:13px;color:#6b7280;margin-bottom:12px">
        Orders are saved per branch. Switching branches loads that branch's order.<br>
        주문은 지점별로 따로 저장됩니다. 지점을 바꾸면 해당 지점의 주문으로 전환됩니다.
      </div>
      <div class="branch-grid" id="branchGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="jayone_products.js"></script>

const BRANCHES = [
  { id: 'MIAMI',          ko: '마이애미',        en: 'Miami' },
  { id: 'PEMBROKE_PINES', ko: '펨브로크 파인즈', en: 'Pembroke Pines' },
  { id: 'HOLLYWOOD',      ko: '할리우드',         en: 'Hollywood' },
  { id: 'CORAL_SPRINGS',  ko: '코럴 스프링스',    en: 'Coral Springs' },
  { id: 'LASOLAS',        ko: '라스올라스',       en: 'LASOLAS' },
  { id: 'WEST_PALM',      ko: '웨스트 팜 비치',   en: 'West Palm Beach' },
];
const BRANCH_BY_ID = Object.fromEntries(BRANCHES.map(b => [b.id, b]));
const BRANCH_KEY = "km_branch"; // shared across Kimchi Mart apps
const cartKey = (branchId) => `ndm_cart_v1__${branchId || ''}`;

// ============ STATE ============
// Shared (not per-branch): prices, priceDate, activeSection/sub (UI navigation)
// Per-branch (isolated): qty
const SHARED_KEY = "ndm_app_v1";
const DEFAULT_PRICE_DATE = "2026-04-21";
let state = loadState();

function loadState() {
  let branchId = "";
  try { branchId = localStorage.getItem(BRANCH_KEY) || ""; } catch {}
  let shared = {};
  try { shared = JSON.parse(localStorage.getItem(SHARED_KEY)) || {}; } catch {}
  let qty = {};
  if (branchId) {
    try { qty = JSON.parse(localStorage.getItem(cartKey(branchId))) || {}; } catch {}
  }
  return {
    activeSection: shared.activeSection || "veg",
    activeSub: shared.activeSub || "all",
    search: "",
    qty,
    prices: shared.prices || {},
    priceDate: shared.priceDate || DEFAULT_PRICE_DATE,
    branchId,
  };
}
function saveState() {
  localStorage.setItem(SHARED_KEY, JSON.stringify({
    activeSection: state.activeSection, activeSub: state.activeSub,
    prices: state.prices, priceDate: state.priceDate,
  }));
  if (state.branchId) {
    localStorage.setItem(cartKey(state.branchId), JSON.stringify(state.qty));
  }
}

function setBranch(newId) {
  if (!BRANCH_BY_ID[newId]) return;
  // Save outgoing branch's qty
  if (state.branchId) {
    localStorage.setItem(cartKey(state.branchId), JSON.stringify(state.qty));
  }
  state.branchId = newId;
  try { localStorage.setItem(BRANCH_KEY, newId); } catch {}
  // Load incoming branch's qty
  try {
    state.qty = JSON.parse(localStorage.getItem(cartKey(newId))) || {};
  } catch {
    state.qty = {};
  }
  updateBranchUI();
  renderContent();
  updateSummary();
}

function updateBranchUI() {
  const btn = document.getElementById("branchBtn");
  const lbl = document.getElementById("branchLabel");
  if (state.branchId && BRANCH_BY_ID[state.branchId]) {
    const b = BRANCH_BY_ID[state.branchId];
    lbl.textContent = `📍 ${b.en} / ${b.ko}`;
    btn.classList.remove("unset");
  } else {
    lbl.textContent = "⚠️ Select branch / 지점 선택";
    btn.classList.add("unset");
  }
  const modalBranch = document.getElementById("modalBranch");
  if (modalBranch) {
    modalBranch.textContent = state.branchId
      ? `📍 ${BRANCH_BY_ID[state.branchId].en} / ${BRANCH_BY_ID[state.branchId].ko}`
      : "No branch / 지점 미선택";
  }
}

function openBranchModal() {
  const grid = document.getElementById("branchGrid");
  grid.innerHTML = BRANCHES.map(b => {
    const cart = (function() { try { return JSON.parse(localStorage.getItem(cartKey(b.id))) || {}; } catch { return {}; } })();
    const count = Object.values(cart).filter(v => v > 0).length;
    const current = b.id === state.branchId;
    return `
      <div class="branch-card ${current?'current':''}" data-id="${b.id}">
        <div class="bko">${b.ko}</div>
        <div class="ben">${b.en}</div>
        ${count > 0 ? `<div class="badge">· ${count} in cart · ${count}종</div>` : (current ? `<div class="badge">· Current 현재 지점</div>` : '')}
      </div>
    `;
  }).join("");
  grid.querySelectorAll(".branch-card").forEach(card => {
    card.addEventListener("click", () => {
      setBranch(card.dataset.id);
      closeBranchModal();
    });
  });
  document.getElementById("branchModal").classList.add("show");
}
function closeBranchModal() {
  document.getElementById("branchModal").classList.remove("show");
}

function itemKey(secId, item) {
  return secId + ":" + (item.plu || item.en);
}

function getPrice(secId, it) {
  const key = itemKey(secId, it);
  return state.prices[key] !== undefined ? state.prices[key] : it.price;
}

function setPrice(secId, it, newPrice) {
  const key = itemKey(secId, it);
  const clean = Math.max(0, Math.round(Number(newPrice) * 100) / 100) || 0;
  if (Math.abs(clean - it.price) < 0.001) {
    delete state.prices[key];
  } else {
    state.prices[key] = clean;
  }
  state.priceDate = new Date().toISOString().slice(0, 10);
  saveState();
  updatePriceHeader();
}

function updatePriceHeader() {
  const dateEl = document.getElementById("priceDate");
  if (dateEl) dateEl.textContent = state.priceDate;
  const edited = Object.keys(state.prices).length;
  const editedEl = document.getElementById("priceEditedCount");
  if (editedEl) editedEl.textContent = edited > 0 ? `· ${edited} edited / ${edited}개 수정됨` : "";
}

// ============ RENDER ============
function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = SECTIONS.map(s => `
    <button class="tab ${state.activeSection===s.id?'active':''}"
            data-id="${s.id}" ${s.enabled ? '' : 'disabled'}>
      ${s.label}${s.enabled ? '' : ' <small>(soon)</small>'}
    </button>
  `).join("");
  el.querySelectorAll(".tab").forEach(b => {
    b.addEventListener("click", () => {
      if (b.disabled) return;
      state.activeSection = b.dataset.id;
      state.activeSub = "all";
      saveState();
      renderAll();
    });
  });
}

function activeSection() {
  return SECTIONS.find(s => s.id === state.activeSection);
}

function renderSubcats() {
  const sec = activeSection();
  const el = document.getElementById("subcats");
  if (!sec.enabled || sec.items.length === 0) { el.innerHTML = ""; return; }
  const counts = { all: sec.items.length };
  for (const it of sec.items) counts[it.cat] = (counts[it.cat] || 0) + 1;
  const chips = [`<button class="chip ${state.activeSub==='all'?'active':''}" data-sub="all">All 전체<span class="count">${counts.all}</span></button>`];
  for (const c of SUBCAT_ORDER) {
    if (!counts[c]) continue;
    chips.push(`<button class="chip ${state.activeSub===c?'active':''}" data-sub="${c}">${SUBCAT_LABEL[c]}<span class="count">${counts[c]}</span></button>`);
  }
  el.innerHTML = chips.join("");
  el.querySelectorAll(".chip").forEach(c => {
    c.addEventListener("click", () => {
      state.activeSub = c.dataset.sub;
      saveState();
      renderContent();
    });
  });
}

function filterItems(items) {
  const q = state.search.trim().toLowerCase();
  let filtered = state.activeSub === "all" ? items : items.filter(it => it.cat === state.activeSub);
  if (q) {
    filtered = filtered.filter(it =>
      it.en.toLowerCase().includes(q) ||
      it.ko.toLowerCase().includes(q) ||
      (it.plu && it.plu.includes(q))
    );
  }
  return filtered;
}

function renderContent() {
  const sec = activeSection();
  const main = document.getElementById("content");
  if (!sec.enabled) {
    main.innerHTML = `
      <div class="placeholder">
        <div class="emoji">🚧</div>
        <div><strong>${sec.label}</strong></div>
        <div class="hint">Section coming soon · 섹션 준비 중<br>Add the item list to enable ordering · 품목 추가 후 바로 주문 가능</div>
      </div>`;
    return;
  }
  const items = filterItems(sec.items);
  if (items.length === 0) {
    main.innerHTML = `<div class="empty-state">No results / 검색 결과가 없습니다</div>`;
    return;
  }
  let html = "";
  if (state.activeSub === "all" && !state.search.trim()) {
    // group by subcategory
    for (const c of SUBCAT_ORDER) {
      const group = items.filter(it => it.cat === c);
      if (!group.length) continue;
      html += `<div class="subcat-header">${SUBCAT_LABEL[c]} <span style="color:#9ca3af;font-weight:500">· ${group.length}</span></div>`;
      html += `<div class="items-grid">${group.map(it => itemHtml(sec.id, it)).join("")}</div>`;
    }
  } else {
    html = `<div class="items-grid">${items.map(it => itemHtml(sec.id, it)).join("")}</div>`;
  }
  main.innerHTML = html;
  main.querySelectorAll(".item").forEach(el => bindItemEvents(el));
}

function itemHtml(secId, it) {
  const key = itemKey(secId, it);
  const qty = state.qty[key] || 0;
  const price = getPrice(secId, it);
  const edited = state.prices[key] !== undefined;
  const unitStr = it.unit ? escapeHtml(it.unit) : '';
  const pluStr = it.plu ? `<span class="plu">#${it.plu}</span>` : '';
  return `
    <div class="item ${qty>0?'has-qty':''}" data-key="${key}">
      <div class="item-head">
        <div class="name-en">${escapeHtml(it.en)}</div>
        ${pluStr}
      </div>
      <div class="name-ko">${escapeHtml(it.ko)}</div>
      <div class="item-foot">
        <span class="unit">${unitStr}</span>
        <span class="price ${edited?'edited':''}" title="탭해서 가격 수정">$<input class="price-input" type="number" step="0.01" min="0" value="${formatPrice(price)}" inputmode="decimal"></span>
      </div>
      <div class="qty-control">
        <button class="qty-btn" data-act="dec">−</button>
        <input class="qty-input" type="number" min="0" step="1" value="${qty || ''}" placeholder="0">
        <button class="qty-btn" data-act="inc">+</button>
      </div>
    </div>`;
}

function sizePriceInput(inp) {
  const v = String(inp.value || '0');
  inp.setAttribute('size', Math.max(1, v.length));
}

function bindItemEvents(el) {
  const key = el.dataset.key;
  const input = el.querySelector(".qty-input");
  el.querySelector('[data-act="inc"]').addEventListener("click", () => {
    setQty(key, (state.qty[key] || 0) + 1);
    input.value = state.qty[key] || '';
    updateItemHighlight(el, key);
    updateSummary();
  });
  el.querySelector('[data-act="dec"]').addEventListener("click", () => {
    const next = Math.max(0, (state.qty[key] || 0) - 1);
    setQty(key, next);
    input.value = state.qty[key] || '';
    updateItemHighlight(el, key);
    updateSummary();
  });
  input.addEventListener("input", () => {
    const v = Math.max(0, Math.floor(Number(input.value) || 0));
    setQty(key, v);
    updateItemHighlight(el, key);
    updateSummary();
  });

  const priceInput = el.querySelector(".price-input");
  const ref = findItemByKey(key);
  sizePriceInput(priceInput);
  priceInput.addEventListener("focus", () => priceInput.select());
  priceInput.addEventListener("input", () => sizePriceInput(priceInput));
  priceInput.addEventListener("blur", () => {
    if (!ref) return;
    setPrice(ref.sec.id, ref.item, priceInput.value);
    priceInput.value = formatPrice(getPrice(ref.sec.id, ref.item));
    sizePriceInput(priceInput);
    el.querySelector(".price").classList.toggle("edited", state.prices[key] !== undefined);
  });
  priceInput.addEventListener("keydown", e => {
    if (e.key === "Enter") { priceInput.blur(); }
    if (e.key === "Escape") {
      if (ref) priceInput.value = formatPrice(getPrice(ref.sec.id, ref.item));
      sizePriceInput(priceInput);
      priceInput.blur();
    }
  });
}

function findItemByKey(key) {
  const idx = key.indexOf(":");
  if (idx < 0) return null;
  const secId = key.slice(0, idx);
  const rest = key.slice(idx + 1);
  const sec = SECTIONS.find(s => s.id === secId);
  if (!sec) return null;
  const item = sec.items.find(it => (it.plu || it.en) === rest);
  return item ? { sec, item } : null;
}

function updateItemHighlight(el, key) {
  el.classList.toggle("has-qty", (state.qty[key] || 0) > 0);
}

function setQty(key, v) {
  if (v > 0) state.qty[key] = v;
  else delete state.qty[key];
  saveState();
}

// ============ SUMMARY ============
function getOrderLines() {
  const lines = [];
  for (const sec of SECTIONS) {
    if (!sec.enabled) continue;
    for (const it of sec.items) {
      const key = itemKey(sec.id, it);
      const q = state.qty[key];
      if (q && q > 0) lines.push({ section: sec.label, item: it, qty: q });
    }
  }
  return lines;
}

function updateSummary() {
  const lines = getOrderLines();
  const units = lines.reduce((a, l) => a + l.qty, 0);
  document.getElementById("totalCount").textContent = `${lines.length} items / ${lines.length}종`;
  document.getElementById("totalUnits").textContent = units > 0 ? `· ${units} units / ${units}개` : "";
  document.getElementById("openOrderBtn").disabled = lines.length === 0;
}

// ============ MODAL ============
function openOrderModal() {
  const lines = getOrderLines();
  const body = document.getElementById("orderList");
  body.innerHTML = lines.map(l => `
    <div class="order-line">
      <div>
        <div class="ol-name">${escapeHtml(l.item.en)}</div>
        <div class="ol-detail">${l.item.plu ? `#${l.item.plu} · ` : ''}${escapeHtml(l.item.ko)}${l.item.unit ? ' · ' + escapeHtml(l.item.unit) : ''}</div>
      </div>
      <div>
        <div class="ol-qty">× ${l.qty}</div>
      </div>
    </div>
  `).join("");
  const units = lines.reduce((a,l)=>a+l.qty,0);
  document.getElementById("modalTotal").textContent = `${lines.length} items · ${units} units`;
  document.getElementById("modal").classList.add("show");
}

function closeOrderModal() {
  document.getElementById("modal").classList.remove("show");
}

function orderAsText() {
  const lines = getOrderLines();
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId ? BRANCH_BY_ID[state.branchId] : null;
  const header = branch ? `[남대문 주문 · ${branch.ko} / ${branch.en} · ${today}]` : `[남대문 주문 · ${today}]`;
  let out = `${header}\n\n`;
  for (const l of lines) {
    out += `${l.item.plu ? `#${l.item.plu} ` : ''}${l.item.en} (${l.item.ko})${l.item.unit ? ' ' + l.item.unit : ''} × ${l.qty}\n`;
  }
  out += `\n총 ${lines.length}종 / ${lines.reduce((a,l)=>a+l.qty,0)}개`;
  return out;
}

function orderAsCSV() {
  const lines = getOrderLines();
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId ? BRANCH_BY_ID[state.branchId] : { ko: '', en: '' };
  const esc = (v) => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const header = `# Namdaemun Order / ${branch.ko} ${branch.en} / ${today}`;
  const cols = ["PLU", "Item (EN)", "Item (KO)", "Unit", "Qty"];
  const rows = lines.map(l => [l.item.plu || '', l.item.en, l.item.ko, l.item.unit || '', l.qty].map(esc).join(","));
  return `${header}\n${cols.join(",")}\n${rows.join("\n")}`;
}

function downloadCSV() {
  const csv = "\ufeff" + orderAsCSV();
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId || "NOBRANCH";
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `namdaemun_${branch}_${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function sendEmail() {
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId ? BRANCH_BY_ID[state.branchId] : null;
  const subject = branch ? `[남대문 주문] ${branch.ko} - ${today}` : `[남대문 주문] ${today}`;
  const body = orderAsText();
  window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

// ============ UTIL ============
function formatPrice(n) {
  if (!n && n !== 0) return "0";
  const rounded = Math.round(n * 100) / 100;
  return rounded.toLocaleString("en-US", { minimumFractionDigits: rounded % 1 === 0 ? 0 : 2, maximumFractionDigits: 2 });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1600);
}

// ============ EVENTS ============
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  document.getElementById("searchClear").classList.toggle("show", state.search.length > 0);
  renderContent();
});
document.getElementById("searchClear").addEventListener("click", () => {
  document.getElementById("search").value = "";
  state.search = "";
  document.getElementById("searchClear").classList.remove("show");
  renderContent();
});
document.getElementById("openOrderBtn").addEventListener("click", () => {
  if (!state.branchId) { openBranchModal(); return; }
  openOrderModal();
});
document.getElementById("closeModal").addEventListener("click", closeOrderModal);
document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeOrderModal();
});
document.getElementById("copyBtn").addEventListener("click", async () => {
  const msg = "Order copied / 주문서 복사됨";
  try {
    await navigator.clipboard.writeText(orderAsText());
    showToast(msg);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = orderAsText();
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast(msg);
  }
});
document.getElementById("excelBtn").addEventListener("click", () => {
  downloadCSV();
  showToast("CSV downloaded / CSV 다운로드 완료");
});
document.getElementById("emailBtn").addEventListener("click", sendEmail);
document.getElementById("clearBtn").addEventListener("click", () => {
  const b = state.branchId ? BRANCH_BY_ID[state.branchId] : null;
  const label = b ? `${b.en} / ${b.ko}` : "this branch / 현재 지점";
  if (!confirm(`Clear ${label} order? / ${label}의 주문을 모두 삭제할까요?`)) return;
  state.qty = {};
  saveState();
  closeOrderModal();
  renderContent();
  updateSummary();
  showToast("Order cleared / 주문 초기화됨");
});

document.getElementById("branchBtn").addEventListener("click", openBranchModal);
document.getElementById("closeBranchModal").addEventListener("click", closeBranchModal);
document.getElementById("branchModal").addEventListener("click", e => {
  if (e.target.id === "branchModal") closeBranchModal();
});

function renderAll() {
  renderTabs();
  renderSubcats();
  renderContent();
  updateSummary();
  updatePriceHeader();
  updateBranchUI();
}

renderAll();
// Prompt for branch on first visit
if (!state.branchId) {
  setTimeout(openBranchModal, 120);
}
</script>
</body>
</html>
