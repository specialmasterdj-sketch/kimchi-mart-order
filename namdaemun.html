<script>
/* URL ?branch=<ID> override — set by vendor-order-center.html so this app
   loads the right per-branch cart regardless of whatever km_branch the device
   was left on by the previous user. */
(function applyUrlBranch(){
  try {
    const u = new URLSearchParams(location.search);
    const b = (u.get('branch') || '').toUpperCase();
    const VALID = ['MIAMI','PEMBROKE_PINES','HOLLYWOOD','CORAL_SPRINGS','LASOLAS','WEST_PALM','ALL'];
    if (b && VALID.indexOf(b) >= 0) localStorage.setItem('km_branch', b);
  } catch(e){}
})();

const BRANCH_BY_ID = Object.fromEntries(BRANCHES.map(b => [b.id, b]));
const BRANCH_KEY = "km_branch"; // shared across Kimchi Mart apps
// Cart is per-branch × per-user — each person's order stays isolated.
// No handoff between people — one person owns their order start to finish.
function _userKey() {
  try {
    const me = JSON.parse(localStorage.getItem('chat.me') || 'null');
    const raw = (me && me.name || '').trim();
    if (!raw) return 'UNASSIGNED';
    return raw.replace(/[.#$\[\]\/\s]/g, '_').slice(0, 40);
  } catch (e) { return 'UNASSIGNED'; }
}
// 🆕 2026-06-08 사장님 지시: 모든 지점 공유 카트. 같은 지점 매니저·직원이
//   하나의 카트에 같이 빌드. userKey 무시 → 지점별 _shared 한 카트.
//   (namdaemun 은 localStorage 기반이라 동일 디바이스 내에서만 공유.)
const cartKey = (branchId, userKey) => `ndm_cart_v1__${branchId || ''}___shared`;

// ============ STATE ============
// Shared (not per-branch): prices, priceDate, activeSection/sub (UI navigation)
// Per-branch × per-user (isolated): qty
const SHARED_KEY = "ndm_app_v1";
const DEFAULT_PRICE_DATE = "2026-04-25";
let state = loadState();

function loadState() {
  let branchId = "";
  try { branchId = localStorage.getItem(BRANCH_KEY) || ""; } catch {}
  let shared = {};
  try { shared = JSON.parse(localStorage.getItem(SHARED_KEY)) || {}; } catch {}
  let qty = {};
  if (branchId) {
    try { qty = JSON.parse(localStorage.getItem(cartKey(branchId, _userKey()))) || {}; } catch {}
  }
  return {
    activeSection: shared.activeSection || "veg",
    activeSub: shared.activeSub || "all",
    search: "",
    qty,
    prices: shared.prices || {},
    // Newer DEFAULT (deploy-time constant) wins over a stale localStorage
    // priceDate so a fresh price upload doesn't leave the date frozen on
    // every browser that ever opened the page.
    priceDate: (shared.priceDate && shared.priceDate > DEFAULT_PRICE_DATE) ? shared.priceDate : DEFAULT_PRICE_DATE,
    branchId,
  };
}
function saveState() {
  localStorage.setItem(SHARED_KEY, JSON.stringify({
    activeSection: state.activeSection, activeSub: state.activeSub,
    prices: state.prices, priceDate: state.priceDate,
  }));
  if (state.branchId) {
    localStorage.setItem(cartKey(state.branchId, _userKey()), JSON.stringify(state.qty));
  }
}

function setBranch(newId) {
  if (!BRANCH_BY_ID[newId]) return;
  const user = _userKey();
  // Save outgoing branch×user qty
  if (state.branchId) {
    localStorage.setItem(cartKey(state.branchId, user), JSON.stringify(state.qty));
  }
  state.branchId = newId;
  try { localStorage.setItem(BRANCH_KEY, newId); } catch {}
  // Load incoming branch×user qty
  try {
    state.qty = JSON.parse(localStorage.getItem(cartKey(newId, user))) || {};
  } catch {
    state.qty = {};
  }
  updateBranchUI();
  renderContent();
  updateSummary();
}

function updateBranchUI() {
  const btn = document.getElementById("branchBtn");
  const lbl = document.getElementById("branchLabel");
  if (state.branchId && BRANCH_BY_ID[state.branchId]) {
    const b = BRANCH_BY_ID[state.branchId];
    lbl.textContent = `📍 ${b.en} / ${b.ko}`;
    btn.classList.remove("unset");
  } else {
    lbl.textContent = "⚠️ Select branch / 지점 선택";
    btn.classList.add("unset");
  }
  const modalBranch = document.getElementById("modalBranch");
  if (modalBranch) {
    modalBranch.textContent = state.branchId
      ? `📍 ${BRANCH_BY_ID[state.branchId].en} / ${BRANCH_BY_ID[state.branchId].ko}`
      : "No branch / 지점 미선택";
  }
}

function openBranchModal() {
  const grid = document.getElementById("branchGrid");
  grid.innerHTML = BRANCHES.map(b => {
    const cart = (function() { try { return JSON.parse(localStorage.getItem(cartKey(b.id, _userKey()))) || {}; } catch { return {}; } })();
    const count = Object.values(cart).filter(v => v > 0).length;
    const current = b.id === state.branchId;
    return `
      <div class="branch-card ${current?'current':''}" data-id="${b.id}">
        <div class="bko">${b.ko}</div>
        <div class="ben">${b.en}</div>
        ${count > 0 ? `<div class="badge">· ${count} in cart · ${count}종</div>` : (current ? `<div class="badge">· Current 현재 지점</div>` : '')}
      </div>
    `;
  }).join("");
  grid.querySelectorAll(".branch-card").forEach(card => {
    card.addEventListener("click", () => {
      setBranch(card.dataset.id);
      closeBranchModal();
    });
  });
  document.getElementById("branchModal").classList.add("show");
}
function closeBranchModal() {
  document.getElementById("branchModal").classList.remove("show");
}

function itemKey(secId, item) {
  return secId + ":" + (item.plu || item.en);
}

function getPrice(secId, it) {
  const key = itemKey(secId, it);
  return state.prices[key] !== undefined ? state.prices[key] : it.price;
}

function setPrice(secId, it, newPrice) {
  const key = itemKey(secId, it);
  const clean = Math.max(0, Math.round(Number(newPrice) * 100) / 100) || 0;
  if (Math.abs(clean - it.price) < 0.001) {
    delete state.prices[key];
  } else {
    state.prices[key] = clean;
  }
  state.priceDate = new Date().toISOString().slice(0, 10);
  saveState();
  updatePriceHeader();
}

function updatePriceHeader() {
  const dateEl = document.getElementById("priceDate");
  if (dateEl) dateEl.textContent = state.priceDate;
  const edited = Object.keys(state.prices).length;
  const editedEl = document.getElementById("priceEditedCount");
  if (editedEl) editedEl.textContent = edited > 0 ? `· ${edited} edited / ${edited}개 수정됨` : "";
}

function filterItems(items) {
  const q = state.search.trim().toLowerCase();
  let filtered = state.activeSub === "all" ? items : items.filter(it => it.cat === state.activeSub);
  if (q) {
    filtered = filtered.filter(it =>
      it.en.toLowerCase().includes(q) ||
      it.ko.toLowerCase().includes(q) ||
      (it.plu && it.plu.includes(q))
    );
  }
  return filtered;
}

function itemHtml(secId, it) {
  const key = itemKey(secId, it);
  const qty = state.qty[key] || 0;
  const price = getPrice(secId, it);
  const edited = state.prices[key] !== undefined;
  const unitStr = it.unit ? escapeHtml(it.unit) : '';
  const pluStr = it.plu ? `<span class="plu">#${it.plu}</span>` : '';
  const imgStr = it.image ? `<div class="item-thumb"><img src="${escapeHtml(it.image)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : '';
  const hasBarcode = !!it.barcode;
  // 2026-06-10 사장님 지시: 가격 표시 제거 (가격 데이터는 유지, 화면에서만 숨김).
  const foot = `<div class="item-foot"><span class="unit">${unitStr}</span></div>` + (hasBarcode ? `<div class="barcode">${escapeHtml(it.barcode)}</div>` : '');
  const recTools  = window.kmRecs ? window.kmRecs.toggleHTML(key) : '';
  const recBadge  = window.kmRecs ? (window.kmRecs.badgeHTML(key) + window.kmRecs.noteHTML(key))  : '';
  const recRing   = window.kmRecs ? window.kmRecs.cardClass(key)  : '';
  // 🎯 발주 가이드 배너 — 수량 입력란 위. 탭하면 사장님 OVER 수량 자동입력.
  const overGuide = window.kmRecs ? window.kmRecs.orderGuideHTML(key, 'cs', "kmApplyOver('"+key+"',{q})") : '';
  return `
    <div class="item ${qty>0?'has-qty':''}${recRing}" data-key="${key}">
      ${imgStr}
      <div class="item-head">
        <div class="name-en">${escapeHtml(it.en)}${recBadge}</div>
        ${pluStr}
      </div>
      <div class="name-ko">${escapeHtml(it.ko)}</div>
      ${recTools}
      ${foot}
      ${overGuide}
      <div class="qty-control">
        <button class="qty-btn" data-act="dec">−</button>
        <input class="qty-input" type="number" min="0" step="1" value="${qty || ''}" placeholder="0">
        <button class="qty-btn" data-act="inc">+</button>
      </div>
    </div>`;
}

function sizePriceInput(inp) {
  const v = String(inp.value || '0');
  inp.setAttribute('size', Math.max(1, v.length));
}

function bindItemEvents(el) {
  const key = el.dataset.key;
  const input = el.querySelector(".qty-input");
  el.querySelector('[data-act="inc"]').addEventListener("click", () => {
    setQty(key, (state.qty[key] || 0) + 1);
    input.value = state.qty[key] || '';
    updateItemHighlight(el, key);
    updateSummary();
  });
  el.querySelector('[data-act="dec"]').addEventListener("click", () => {
    const next = Math.max(0, (state.qty[key] || 0) - 1);
    setQty(key, next);
    input.value = state.qty[key] || '';
    updateItemHighlight(el, key);
    updateSummary();
  });
  input.addEventListener("input", () => {
    const v = Math.max(0, Math.floor(Number(input.value) || 0));
    setQty(key, v);
    updateItemHighlight(el, key);
    updateSummary();
  });

  const priceInput = el.querySelector(".price-input");
  if (priceInput) {
    const ref = findItemByKey(key);
    sizePriceInput(priceInput);
    priceInput.addEventListener("focus", () => priceInput.select());
    priceInput.addEventListener("input", () => sizePriceInput(priceInput));
    priceInput.addEventListener("blur", () => {
      if (!ref) return;
      setPrice(ref.sec.id, ref.item, priceInput.value);
      priceInput.value = formatPrice(getPrice(ref.sec.id, ref.item));
      sizePriceInput(priceInput);
      el.querySelector(".price").classList.toggle("edited", state.prices[key] !== undefined);
    });
    priceInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { priceInput.blur(); }
      if (e.key === "Escape") {
        if (ref) priceInput.value = formatPrice(getPrice(ref.sec.id, ref.item));
        sizePriceInput(priceInput);
        priceInput.blur();
      }
    });
  }

  // 카드 빈 영역 클릭 → 제품 상세 모달 (수량/별표/메모/가격 버튼은 제외)
  el.addEventListener("click", (e) => {
    if (e.target.closest('.qty-control') || e.target.closest('.km-rec-tools') ||
        e.target.closest('button') || e.target.closest('input')) return;
    openItemDetail(key);
  });
}

function findItemByKey(key) {
  const idx = key.indexOf(":");
  if (idx < 0) return null;
  const secId = key.slice(0, idx);
  const rest = key.slice(idx + 1);
  const sec = SECTIONS.find(s => s.id === secId);
  if (!sec) return null;
  const item = sec.items.find(it => (it.plu || it.en) === rest);
  return item ? { sec, item } : null;
}

// ===== PRODUCT DETAIL MODAL (제품 클릭 시 세부사항) =====
function openItemDetail(key) {
  const ref = findItemByKey(key);
  if (!ref) return;
  const it = ref.item;
  const qty = state.qty[key] || 0;
  const img = it.image
    ? '<div class="pd-img-wrap"><img src="' + escapeHtml(it.image) + '" onerror="this.style.display=\'none\'"></div>'
    : '<div class="pd-img-wrap"><div class="pd-noimg">📦</div></div>';
  const rows = [];
  rows.push(['품번 / PLU', it.plu ? '#' + escapeHtml(it.plu) : '-']);
  if (it.cat) rows.push(['분류 / Category', escapeHtml(it.cat)]);
  if (it.unit) rows.push(['단위 / Unit', escapeHtml(it.unit)]);
  if (it.barcode) rows.push(['바코드 / Barcode', escapeHtml(it.barcode)]);
  const tbl = '<table class="pd-table">' + rows.map(r => '<tr><td class="l">' + r[0] + '</td><td class="v">' + r[1] + '</td></tr>').join('') + '</table>';
  document.getElementById('pdItemBody').innerHTML =
    img +
    '<div class="pd-name-en">' + escapeHtml(it.en) + '</div>' +
    (it.ko ? '<div class="pd-name-ko">' + escapeHtml(it.ko) + '</div>' : '') +
    tbl +
    '<div class="pd-qty">' +
      '<button onclick="pdItemBump(-1)">−</button>' +
      '<input type="number" min="0" id="pdItemQty" value="' + qty + '">' +
      '<button onclick="pdItemBump(1)">+</button>' +
      '<button class="pd-add" onclick="pdItemSave()">담기 / Save</button>' +
    '</div>';
  const m = document.getElementById('pdItemModal');
  m.dataset.key = key;
  m.classList.add('show');
}
function closeItemDetail() {
  const m = document.getElementById('pdItemModal');
  if (m) m.classList.remove('show');
}
function pdItemBump(d) {
  const inp = document.getElementById('pdItemQty');
  if (inp) inp.value = Math.max(0, (parseInt(inp.value, 10) || 0) + d);
}
function pdItemSave() {
  const m = document.getElementById('pdItemModal');
  const key = m.dataset.key;
  const n = Math.max(0, Math.floor(Number(document.getElementById('pdItemQty').value) || 0));
  setQty(key, n);
  document.querySelectorAll('.item').forEach(el => {
    if (el.dataset.key === key) {
      const inp = el.querySelector('.qty-input');
      if (inp) inp.value = n || '';
      updateItemHighlight(el, key);
    }
  });
  updateSummary();
  closeItemDetail();
  showToast(n > 0 ? ('✓ ' + n + ' 담음 / added') : '비움 / cleared');
}

function updateItemHighlight(el, key) {
  el.classList.toggle("has-qty", (state.qty[key] || 0) > 0);
}

function setQty(key, v) {
  if (v > 0) state.qty[key] = v;
  else delete state.qty[key];
  saveState();
}

// 🎯 2026-06-09 OVER 가이드 배너 탭 → 케이스 수량 자동입력 + UI 즉시 갱신.
//   namdaemun 은 setQty 가 input/highlight 를 안 건드려서 (bindItemEvents 가 담당)
//   배너 탭 전용 헬퍼로 한 번에 갱신.
window.kmApplyOver = function(key, qty){
  setQty(key, qty);
  try {
    const sel = (window.CSS && CSS.escape) ? CSS.escape(key) : key;
    const el = document.querySelector('.item[data-key="' + sel + '"]');
    if (el){
      const input = el.querySelector('.qty-input');
      if (input) input.value = state.qty[key] || '';
      updateItemHighlight(el, key);
    }
    updateSummary();
  } catch(e){ console.warn('kmApplyOver', e); }
};

// ============ SUMMARY ============
function getOrderLines() {
  const lines = [];
  for (const sec of SECTIONS) {
    if (!sec.enabled) continue;
    for (const it of sec.items) {
      const key = itemKey(sec.id, it);
      const q = state.qty[key];
      if (q && q > 0) lines.push({ section: sec.label, item: it, qty: q });
    }
  }
  return lines;
}

function updateSummary() {
  const lines = getOrderLines();
  const units = lines.reduce((a, l) => a + l.qty, 0);
  document.getElementById("totalCount").textContent = `${lines.length} items / ${lines.length}종`;
  document.getElementById("totalUnits").textContent = units > 0 ? `· ${units} units / ${units}개` : "";
  document.getElementById("openOrderBtn").disabled = lines.length === 0;
}

// ============ MODAL ============
function openOrderModal() {
  const lines = getOrderLines();
  const body = document.getElementById("orderList");
  body.innerHTML = lines.map(l => `
    <div class="order-line">
      <div>
        <div class="ol-name">${escapeHtml(l.item.en)}</div>
        <div class="ol-detail">${l.item.plu ? `#${l.item.plu} · ` : ''}${escapeHtml(l.item.ko)}${l.item.unit ? ' · ' + escapeHtml(l.item.unit) : ''}</div>
      </div>
      <div>
        <div class="ol-qty">× ${l.qty}</div>
      </div>
    </div>
  `).join("");
  const units = lines.reduce((a,l)=>a+l.qty,0);
  document.getElementById("modalTotal").textContent = `${lines.length} items · ${units} units`;
  document.getElementById("modal").classList.add("show");
}

function closeOrderModal() {
  document.getElementById("modal").classList.remove("show");
}

function orderAsText() {
  const lines = getOrderLines();
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId ? BRANCH_BY_ID[state.branchId] : null;
  const header = branch ? `[남대문 주문 · ${branch.ko} / ${branch.en} · ${today}]` : `[남대문 주문 · ${today}]`;
  let out = `${header}\n\n`;
  for (const l of lines) {
    out += `${l.item.plu ? `#${l.item.plu} ` : ''}${l.item.en} (${l.item.ko})${l.item.unit ? ' ' + l.item.unit : ''} × ${l.qty}\n`;
  }
  out += `\n총 ${lines.length}종 / ${lines.reduce((a,l)=>a+l.qty,0)}개`;
  return out;
}

function orderAsCSV() {
  const lines = getOrderLines();
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId ? BRANCH_BY_ID[state.branchId] : { ko: '', en: '' };
  const esc = (v) => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const header = `# Namdaemun Order / ${branch.ko} ${branch.en} / ${today}`;
  const cols = ["PLU", "Item (EN)", "Item (KO)", "Unit", "Qty"];
  const rows = lines.map(l => [l.item.plu || '', l.item.en, l.item.ko, l.item.unit || '', l.qty].map(esc).join(","));
  return `${header}\n${cols.join(",")}\n${rows.join("\n")}`;
}

function downloadCSV() {
  const csv = "\ufeff" + orderAsCSV();
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId || "NOBRANCH";
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `namdaemun_${branch}_${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function sendEmail() {
  const today = new Date().toISOString().slice(0,10);
  const branch = state.branchId ? BRANCH_BY_ID[state.branchId] : null;
  const subject = branch ? `[남대문 주문] ${branch.ko} - ${today}` : `[남대문 주문] ${today}`;
  const body = orderAsText();
  window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

// ============ UTIL ============
function formatPrice(n) {
  if (!n && n !== 0) return "0";
  const rounded = Math.round(n * 100) / 100;
  return rounded.toLocaleString("en-US", { minimumFractionDigits: rounded % 1 === 0 ? 0 : 2, maximumFractionDigits: 2 });
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1600);
}

// ============ EVENTS ============
document.getElementById("search").addEventListener("input", e => {
  state.search = e.target.value;
  document.getElementById("searchClear").classList.toggle("show", state.search.length > 0);
  renderContent();
});
document.getElementById("searchClear").addEventListener("click", () => {
  document.getElementById("search").value = "";
  state.search = "";
  document.getElementById("searchClear").classList.remove("show");
  renderContent();
});
document.getElementById("openOrderBtn").addEventListener("click", () => {
  if (!state.branchId) { openBranchModal(); return; }
  openOrderModal();
});
document.getElementById("closeModal").addEventListener("click", closeOrderModal);
document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeOrderModal();
});
document.getElementById("copyBtn").addEventListener("click", async () => {
  const msg = "Order copied / 주문서 복사됨";
  try {
    await navigator.clipboard.writeText(orderAsText());
    showToast(msg);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = orderAsText();
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast(msg);
  }
});
document.getElementById("excelBtn").addEventListener("click", () => {
  downloadCSV();
  showToast("CSV downloaded / CSV 다운로드 완료");
});
document.getElementById("emailBtn").addEventListener("click", sendEmail);
document.getElementById("clearBtn").addEventListener("click", () => {
  const b = state.branchId ? BRANCH_BY_ID[state.branchId] : null;
  const label = b ? `${b.en} / ${b.ko}` : "this branch / 현재 지점";
  // 🛡️ 2026-06-08: 공유 카트 보호 — 강화된 confirm + localStorage 백업.
  const types = Object.keys(state.qty || {}).length;
  const units = Object.values(state.qty || {}).reduce((s,n)=>s+(+n||0),0);
  if (!types){ showToast("이미 비어있음"); return; }
  const warn = `⚠️ 공유 주문 카트입니다.\n\n[${label}] 의 다른 매니저·직원이 추가한 모든 주문이 사라집니다:\n  · ${types}종 / ${units}개 품목\n\n정말 전체를 비우시겠어요?\n(비우기 전 자동 백업)`;
  if (!confirm(warn)) return;
  try {
    const ts = String(Date.now());
    const bid = state.branchId || 'UNASSIGNED';
    const histKey = `ndm_cart_v1_history__${bid}__${ts}`;
    localStorage.setItem(histKey, JSON.stringify({ ts:+ts, types, units, cart: state.qty }));
  } catch(e){ console.warn('namdaemun clear backup failed', e); }
  state.qty = {};
  saveState();
  closeOrderModal();
  renderContent();
  updateSummary();
  showToast("Order cleared / 주문 초기화됨 (백업 보관)");
});

document.getElementById("branchBtn").addEventListener("click", openBranchModal);
document.getElementById("closeBranchModal").addEventListener("click", closeBranchModal);
document.getElementById("branchModal").addEventListener("click", e => {
  if (e.target.id === "branchModal") closeBranchModal();
});

function renderAll() {
  renderTabs();
  renderSubcats();
  renderContent();
  updateSummary();
  updatePriceHeader();
  updateBranchUI();
}

renderAll();
// Prompt for branch on first visit
if (!state.branchId) {
  setTimeout(openBranchModal, 120);
}
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getDatabase, ref, set, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBwL0Wa1Q8aFhZp5hsn9gTw5aZwXUdAVy4",
  authDomain: "kimchi-mart-order.firebaseapp.com",
  databaseURL: "https://kimchi-mart-order-default-rtdb.firebaseio.com",
  projectId: "kimchi-mart-order",
  storageBucket: "kimchi-mart-order.firebasestorage.app",
  messagingSenderId: "640942647201",
  appId: "1:640942647201:web:1e3421fb55c89155230de0"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

if (window.kmRecs){
  window.kmRecs.init({
    db, ref, set, onValue, remove,
    vendor: 'namdaemun',
    branch: (function(){ try { return localStorage.getItem('km_branch') || ''; } catch(e){ return ''; } })()
  });
  window.kmRecs.subscribe(() => {
    try { if (typeof renderContent === 'function') renderContent(); } catch(e){}
  });
}
// Re-subscribe once the user's auth token is restored from IndexedDB —
// otherwise the very first read can race ahead of auth and silently fail.
onAuthStateChanged(auth, (user) => {
  if (user && window.kmRecs) window.kmRecs.refresh();
});
</script>
