<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>가격표 생성기 — 김치마트</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#e5e7eb;color:#111}
  header{background:#1a5c3a;color:#fff;padding:10px 14px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:15px;font-weight:700}
  header .stat{font-size:11px;opacity:.85;margin-left:auto;max-width:280px;text-align:right;line-height:1.3}
  header button,header select{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  header button:hover,header select:hover{background:rgba(255,255,255,.22)}
  header button.danger{background:#fef2f2;color:#dc2626;border-color:#dc2626}
  header select{background:rgba(0,0,0,.15)}

  main{display:grid;grid-template-columns:380px 1fr;gap:14px;padding:14px;max-width:1500px;margin:0 auto;align-items:start}

  .panel{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .panel h2{font-size:12px;color:#1a5c3a;margin-bottom:6px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
  .panel h2 .hint{font-weight:500;color:#9ca3af;font-size:11px;letter-spacing:0;text-transform:none}

  .search-row{display:flex;gap:6px;margin-bottom:8px}
  .search-row input{flex:1;padding:9px 10px;border:1.5px solid #d1d5db;border-radius:8px;font-size:13px;font-family:inherit}
  .search-row input:focus{outline:0;border-color:#1a5c3a}
  .scan-btn{background:#1a5c3a;color:#fff;border:0;border-radius:8px;padding:0 12px;font-size:18px;font-weight:700;cursor:pointer;flex-shrink:0}
  .scan-btn.scanning{background:#dc2626;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

  #scan-area{display:none;background:#000;border-radius:8px;overflow:hidden;margin-bottom:8px;position:relative}
  #scan-area.on{display:block}
  #qrReader{width:100%;background:#000}
  #qrReader video{width:100% !important;height:auto !important;display:block;max-height:300px;object-fit:cover}
  #qrReader__dashboard{display:none !important}
  #qrReader__scan_region{padding:0 !important;background:#000 !important}
  .scan-msg{position:absolute;top:6px;left:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;padding:4px 8px;font-size:11px;border-radius:4px;text-align:center;pointer-events:none}

  .results{max-height:280px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:6px;background:#fafafa}
  .result-item{padding:7px 9px;border-bottom:1px solid #eee;cursor:pointer;font-size:12px;line-height:1.3}
  .result-item:hover{background:#e8f0eb}
  .result-item .top{font-weight:600;color:#111}
  .result-item .meta{font-size:10px;color:#9ca3af;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .result-item .price{color:#1a5c3a;font-weight:700}
  .result-empty{padding:18px;text-align:center;color:#9ca3af;font-size:12px}

  .form-row{display:grid;grid-template-columns:80px 1fr;gap:6px 8px;margin-top:10px;align-items:center}
  .form-row label{font-size:11px;color:#374151;font-weight:600}
  .form-row label .opt{color:#9ca3af;font-weight:500;font-size:10px}
  .form-row input,.form-row select{padding:7px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;width:100%}
  .form-row input:focus{outline:0;border-color:#1a5c3a}
  .price-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}

  .pickers{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .picker{background:#f9fafb;border-radius:8px;padding:8px}
  .picker .lbl{font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .picker .opts{display:grid;grid-template-columns:1fr 1fr;gap:4px}
  .picker .opts label{padding:5px 4px;border:1.5px solid #d1d5db;border-radius:5px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;background:#fff;line-height:1.2}
  .picker .opts input{display:none}
  .picker.tpl .opts label.t-regular{color:#1a5c3a}
  .picker.tpl .opts label.t-sale{color:#dc2626}
  .picker.tpl .opts label.t-new{color:#b45309}
  .picker.tpl .opts label.t-member{color:#1d4ed8}
  .picker .opts label[data-active="1"]{border-color:currentColor;background:rgba(0,0,0,.04)}

  .add-btn{width:100%;background:#1a5c3a;color:#fff;border:0;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
  .add-btn:disabled{background:#9ca3af;cursor:not-allowed}

  .preview-wrap{overflow-x:auto}
  .toolbar{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
  .toolbar .count{font-size:12px;color:#374151;font-weight:600;margin-left:auto}
  .toolbar button{background:#fff;color:#1a5c3a;border:1px solid #1a5c3a;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
  .toolbar button.print{background:#1a5c3a;color:#fff}
  .toolbar button.danger{color:#dc2626;border-color:#dc2626}

  .page{
    background:#fff;
    width:210mm;
    min-height:297mm;
    margin:0 auto 12px;
    padding:10mm;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    display:grid;
    gap:4mm;
  }
  .page.size-xs{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(7,1fr)} /* 21-up 3x7 */
  .page.size-s{grid-template-columns:1fr 1fr;grid-template-rows:repeat(4, 1fr)}      /* 8-up */
  .page.size-m{grid-template-columns:1fr 1fr;grid-template-rows:repeat(2, 1fr)}      /* 4-up */
  .page.size-l{grid-template-columns:1fr;grid-template-rows:repeat(2, 1fr)}          /* 2-up */
  .page.size-xl{grid-template-columns:1fr;grid-template-rows:1fr}                    /* 1-up */

  .empty-slot{
    border:2px dashed #d1d5db;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    color:#9ca3af;font-size:13px;
  }

  /* 태그 — 캔바 스타일 (좌측 40%: KIMCHI 로고 + 상품 이미지 / 우측 60%: 텍스트 + 빨간 가격 + EACH) */
  .tag{
    width:100%;height:100%;
    border:1px dashed #999;
    border-radius:4px;
    padding:3mm;
    display:grid;
    grid-template-columns:40% 1fr;
    grid-template-rows:auto auto 1fr auto;
    gap:1mm 3mm;
    position:relative;
    overflow:hidden;
    background:#fff;
    box-sizing:border-box;
  }
  /* 좌측 컬럼: 상품 이미지 (전체) + KIMCHI 로고 (좌상단 고정 오버레이) */
  .tag .img-box{
    grid-column:1;grid-row:1 / span 4;
    display:flex;align-items:center;justify-content:center;
    background:#f3f4f6;border-radius:4px;overflow:hidden;
    cursor:pointer;
    border:1px dashed #d1d5db;
    color:#9ca3af;text-align:center;padding:1mm;
    align-self:stretch;
    position:relative;
  }
  .tag .store-mark{
    position:absolute;
    top:1mm;left:1mm;
    z-index:2;
    display:flex;align-items:center;
    background:rgba(255,255,255,0.92);
    border-radius:2px;
    padding:0.3mm 1mm;
    box-shadow:0 1px 2px rgba(0,0,0,.08);
  }
  .tag .store-mark img{height:100%;width:auto;display:block}
  .tag .img-box.has{border:0;cursor:default;background:#fff}
  .tag .img-box img{width:100%;height:100%;object-fit:contain}
  /* 우측 컬럼: 브랜드(상단) / 이름(중간 flex) / 가격(하단) */
  .tag .brand,.tag .name,.tag .meta,.tag .name-ko{grid-column:2}

  /* 사이즈별 행 배치 — 좌:이미지(전체) + 로고 오버레이, 우:브랜드+이름+가격 */
  .size-xs .tag,
  .size-s .tag,
  .size-m .tag,
  .size-l .tag{grid-template-rows:auto 1fr auto}
  .size-xs .tag .img-box,
  .size-s .tag .img-box,
  .size-m .tag .img-box,
  .size-l .tag .img-box{grid-row:1 / span 3;width:100%;align-self:stretch}
  .size-xs .tag .brand,
  .size-s .tag .brand,
  .size-m .tag .brand,
  .size-l .tag .brand{grid-row:1;align-self:start}
  .size-xs .tag .name,
  .size-s .tag .name,
  .size-m .tag .name,
  .size-l .tag .name{grid-row:2;align-self:start}
  .size-xs .tag .meta,
  .size-s .tag .meta,
  .size-m .tag .meta,
  .size-l .tag .meta{grid-row:3;align-self:end}

  /* 사이즈별 KIMCHI 로고 오버레이 크기 */
  .size-xs .tag{padding:1.5mm;gap:0.5mm 1.5mm}
  .size-xs .tag .store-mark{height:3mm;top:0.5mm;left:0.5mm;padding:0.2mm 0.5mm}
  .size-xs .tag .img-box{min-height:14mm;border-radius:2px}
  .size-s .tag .store-mark{height:5mm}
  .size-s .tag .img-box{min-height:30mm}
  .size-m .tag .store-mark{height:8mm;top:1.5mm;left:1.5mm;padding:0.5mm 1.5mm}
  .size-m .tag .img-box{min-height:60mm}
  .size-l .tag .store-mark{height:12mm;top:2mm;left:2mm;padding:0.8mm 2mm}
  .size-l .tag .img-box{min-height:60mm}

  .size-xl .tag{grid-template-columns:1fr;grid-template-rows:auto auto 1fr auto;gap:3mm;padding:10mm}
  .size-xl .tag .img-box{grid-row:1;grid-column:1;width:130mm;height:130mm;margin:0 auto;justify-self:center;min-height:auto;position:relative}
  .size-xl .tag .store-mark{height:20mm;top:3mm;left:3mm;padding:1.5mm 3mm}
  .size-xl .tag .brand{grid-row:2;grid-column:1;text-align:center;justify-self:center}
  .size-xl .tag .name{grid-row:3;grid-column:1;text-align:center;justify-self:center}
  .size-xl .tag .meta{grid-row:4;grid-column:1;justify-content:center;width:100%}
  .tag .brand{
    font-weight:800;letter-spacing:0.5px;text-transform:uppercase;
    color:#1a5c3a;
    align-self:start;justify-self:start;
    line-height:1.1;
  }
  .tag .name{font-weight:700;color:#111;line-height:1.15;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;align-self:start}
  .tag .name-ko{color:#6b7280;font-weight:500;line-height:1.2;margin-top:0.5mm}
  .tag .meta{display:flex;align-items:flex-end;gap:2mm;margin-top:auto;flex-wrap:nowrap;align-self:end;justify-self:start}
  .tag .meta .price-block{display:flex;flex-direction:column;align-items:flex-start;line-height:1}
  .tag .meta .price{font-weight:900;color:#dc2626;line-height:0.95;white-space:nowrap;letter-spacing:-1px}
  .tag .meta .each{font-weight:800;color:#111;letter-spacing:0.5px;margin-top:0.5mm}
  .tag .meta .price-old{color:#9ca3af;text-decoration:line-through;text-decoration-thickness:1.5px;font-weight:600}
  .tag .meta .size-txt{font-weight:600;color:#6b7280;align-self:flex-end;margin-bottom:1mm}
  .tag .code{position:absolute;bottom:1.5mm;right:3mm;font-family:monospace;color:#9ca3af}
  .tag .remove{
    position:absolute;top:2mm;left:2mm;
    width:18px;height:18px;border:0;border-radius:50%;
    background:#fee2e2;color:#dc2626;font-size:12px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;line-height:1;z-index:2;
  }

  /* 사이즈별 폰트 — 가격 > 상품명 > 브랜드 (꽉차게) */
  .size-xs .tag .img-box{font-size:5pt}
  .size-xs .tag .brand{font-size:5pt;letter-spacing:0.2px}
  .size-xs .tag .name{font-size:8pt;-webkit-line-clamp:2;font-weight:800;line-height:1.05}
  .size-xs .tag .name-ko{font-size:5.5pt}
  .size-xs .tag .meta{gap:1mm}
  .size-xs .tag .meta .size-txt{font-size:5pt}
  .size-xs .tag .meta .price{font-size:20pt;letter-spacing:-0.5px}
  .size-xs .tag .meta .each{font-size:5pt;margin-top:0}
  .size-xs .tag .meta .price-old{font-size:7pt}
  .size-xs .tag .code{font-size:4pt;bottom:0.5mm;right:1mm}

  .size-s .tag .img-box{font-size:7pt}
  .size-s .tag .brand{font-size:8pt}
  .size-s .tag .name{font-size:14pt;-webkit-line-clamp:3;font-weight:800}
  .size-s .tag .name-ko{font-size:8pt}
  .size-s .tag .meta .size-txt{font-size:8pt}
  .size-s .tag .meta .price{font-size:42pt}
  .size-s .tag .meta .each{font-size:9pt}
  .size-s .tag .meta .price-old{font-size:11pt}
  .size-s .tag .code{font-size:6pt}

  .size-m .tag .img-box{font-size:10pt}
  .size-m .tag .brand{font-size:14pt}
  .size-m .tag .name{font-size:24pt;-webkit-line-clamp:3;font-weight:800}
  .size-m .tag .name-ko{font-size:14pt}
  .size-m .tag .meta .size-txt{font-size:13pt}
  .size-m .tag .meta .price{font-size:72pt}
  .size-m .tag .meta .each{font-size:16pt}
  .size-m .tag .meta .price-old{font-size:18pt}
  .size-m .tag .code{font-size:8pt}

  .size-l .tag .img-box{font-size:14pt}
  .size-l .tag .brand{font-size:20pt}
  .size-l .tag .name{font-size:34pt;-webkit-line-clamp:3;font-weight:800}
  .size-l .tag .name-ko{font-size:20pt}
  .size-l .tag .meta .size-txt{font-size:20pt}
  .size-l .tag .meta .price{font-size:110pt}
  .size-l .tag .meta .each{font-size:26pt}
  .size-l .tag .meta .price-old{font-size:30pt}
  .size-l .tag .code{font-size:10pt}

  .size-xl .tag .img-box{font-size:18pt}
  .size-xl .tag .brand{font-size:32pt}
  .size-xl .tag .name{font-size:60pt;-webkit-line-clamp:3;font-weight:800}
  .size-xl .tag .name-ko{font-size:32pt}
  .size-xl .tag .meta .size-txt{font-size:26pt}
  .size-xl .tag .meta .price{font-size:170pt}
  .size-xl .tag .meta .each{font-size:36pt}
  .size-xl .tag .meta .price-old{font-size:44pt}
  .size-xl .tag .code{font-size:12pt}

  .tag.sale{border:2px solid #dc2626;background:#fff5f5}
  .tag.sale::before{content:"SALE";position:absolute;top:0;right:0;background:#dc2626;color:#fff;font-weight:800;letter-spacing:1px;border-bottom-left-radius:4px;z-index:1}
  .size-s .tag.sale::before{padding:1.5mm 4mm;font-size:9pt}
  .size-m .tag.sale::before{padding:2mm 5mm;font-size:13pt}
  .size-l .tag.sale::before{padding:3mm 6mm;font-size:18pt}
  .size-xl .tag.sale::before{padding:4mm 8mm;font-size:24pt}
  .tag.sale .price{color:#dc2626}

  .tag.neww{border:2px solid #f59e0b;background:#fffbeb}
  .tag.neww::before{content:"NEW";position:absolute;top:0;right:0;background:#f59e0b;color:#fff;font-weight:800;letter-spacing:1px;border-bottom-left-radius:4px;z-index:1}
  .size-s .tag.neww::before{padding:1.5mm 4mm;font-size:9pt}
  .size-m .tag.neww::before{padding:2mm 5mm;font-size:13pt}
  .size-l .tag.neww::before{padding:3mm 6mm;font-size:18pt}
  .size-xl .tag.neww::before{padding:4mm 8mm;font-size:24pt}
  .tag.neww .price{color:#b45309}

  .tag.member{border:2px solid #2563eb;background:#eff6ff}
  .tag.member::before{content:"MEMBER";position:absolute;top:0;right:0;background:#2563eb;color:#fff;font-weight:800;letter-spacing:.5px;border-bottom-left-radius:4px;z-index:1}
  .size-s .tag.member::before{padding:1.5mm 4mm;font-size:8pt}
  .size-m .tag.member::before{padding:2mm 5mm;font-size:11pt}
  .size-l .tag.member::before{padding:3mm 6mm;font-size:15pt}
  .size-xl .tag.member::before{padding:4mm 8mm;font-size:20pt}
  .tag.member .price{color:#1d4ed8}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.3);max-width:90vw;text-align:center}
  .toast.ok{background:#1a5c3a}
  .toast.err{background:#dc2626}

  @media print{
    body{background:#fff}
    header,main > .panel,.toolbar,.tag .remove,#scan-area{display:none !important}
    main{display:block;padding:0;max-width:none}
    .preview-wrap{overflow:visible}
    .page{box-shadow:none;margin:0;page-break-after:always}
    .empty-slot{visibility:hidden;border:0}
  }

  @media (max-width:900px){
    main{grid-template-columns:1fr}
    .page{transform:scale(.7);transform-origin:top left;margin-bottom:-30%}
  }
</style>
</head>
<body>

<header>
  <h1>🏷️ 가격표</h1>
  <select id="branch" onchange="onBranchChange(this.value)">
    <option value="">지점 선택</option>
    <option value="MIAMI">마이애미</option>
    <option value="HOLLYWOOD">할리우드</option>
    <option value="LASOLAS">라스올라스</option>
    <option value="CORAL_SPRINGS">코럴 스프링스</option>
    <option value="PEMBROKE_PINES">펨브로크 파인즈</option>
    <option value="WEST_PALM">웨스트 팜</option>
  </select>
  <button onclick="reloadPos(true)" title="POS 최신 자료 다시 불러오기">🔄</button>
  <input id="session" placeholder="세션 (폰↔PC 연동 키)" style="background:rgba(0,0,0,.15);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;width:160px" onchange="onSessionChange(this.value)">
  <span id="sync-dot" title="연동 상태" style="width:10px;height:10px;border-radius:50%;background:#9ca3af;display:inline-block"></span>
  <span class="stat" id="stat">초기화 중…</span>
  <button onclick="showQR()" title="폰으로 접속할 QR/링크">📱</button>
  <button onclick="exportTags()">💾</button>
  <button onclick="loadTags()">📂</button>
  <button class="danger" onclick="if(confirm('태그 모두 비울까요?'))clearAll()">🗑</button>
</header>

<div id="qr-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:center;justify-content:center" onclick="closeQR(event)">
  <div style="background:#fff;border-radius:12px;padding:20px;max-width:90vw;text-align:center" onclick="event.stopPropagation()">
    <h3 style="color:#1a5c3a;margin-bottom:10px">📱 폰에서 같은 세션 열기</h3>
    <p style="font-size:13px;color:#374151;margin-bottom:12px">PC와 폰을 같은 세션 키로 맞추면 스캔이 실시간 동기화됩니다.</p>
    <div id="qr-target" style="margin:14px auto"></div>
    <p style="font-size:11px;color:#6b7280;word-break:break-all" id="qr-url"></p>
    <p style="font-size:14px;color:#1a5c3a;font-weight:700;margin-top:8px">세션 키: <span id="qr-session"></span></p>
    <button onclick="closeQR()" style="margin-top:14px;background:#1a5c3a;color:#fff;border:0;border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer">닫기</button>
  </div>
</div>

<main>
  <section class="panel">
    <h2>1. 검색 / 스캔 <span class="hint">이름 · 바코드 · ITEM #</span></h2>
    <div class="search-row">
      <input type="text" id="search" placeholder="이름 또는 바코드…" autocomplete="off">
      <button class="scan-btn" id="scan-btn" onclick="toggleScan()" title="바코드 스캔">📷</button>
    </div>
    <div id="scan-area">
      <div id="qrReader"></div>
      <div class="scan-msg">상품 바코드를 카메라에 비춰주세요</div>
    </div>

<div id="toast" class="toast" style="display:none"></div>

<script>
const STORAGE_KEY = 'kimchi-price-tags-v2';
const POS_CACHE_KEY = (b) => 'kimchi-products-override-' + b;
const FB_URL = (b) => `https://kimchi-mart-order-default-rtdb.firebaseio.com/products/${b}.json`;
const SESSION_URL = (s) => `https://kimchi-mart-order-default-rtdb.firebaseio.com/price-tag-sessions/${s}.json`;
const DEVICE_ID = (() => {
  try {
    let id = localStorage.getItem('km-device-id');
    if (!id){ id = 'd' + Math.random().toString(36).slice(2, 10); localStorage.setItem('km-device-id', id); }
    return id;
  } catch(e){ return 'd' + Math.random().toString(36).slice(2, 10); }
})();

let posRows = [];        // POS 데이터 (Firebase or cache)
let posMeta = null;      // { date, count, branchId }
let masterFallback = []; // master.json fallback
let branch = '';
let tags = [];
let pageCount = 1;
let currentSize = 's';
const PER_PAGE = { xs: 21, s: 8, m: 4, l: 2, xl: 1 };

// 세션 동기화 상태
let session = '';
let lastPushTs = 0;       // 마지막으로 우리가 푸시한 시각
let lastSeenTs = 0;       // 마지막으로 본 원격 시각
let pushTimer = null;
let pollTimer = null;

// ============ Toast ============
let toastTimer;
function toast(msg, type='', ms=3000){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', ms);
}

// ============ POS 데이터 로드 ============
async function loadPos(force = false){
  const stat = document.getElementById('stat');
  if (!branch){
    stat.textContent = '⚠ 지점을 선택하세요';
    return;
  }
  // 1. localStorage 캐시 우선 확인 (force=false 시)
  if (!force){
    try {
      const raw = localStorage.getItem(POS_CACHE_KEY(branch));
      if (raw){
        const obj = JSON.parse(raw);
        if (obj && Array.isArray(obj.rows) && obj.rows.length){
          posRows = obj.rows;
          posMeta = { date: obj.date, count: obj.count, branchId: obj.branchId };
          updateStat('cache');
        }
      }
    } catch(e){}
  }
  // 2. Firebase 에서 최신 가져오기
  stat.textContent = `${branchLabel(branch)} POS 자료 가져오는 중…`;
  try {
    const res = await fetch(FB_URL(branch));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const obj = await res.json();
    if (obj && Array.isArray(obj.rows) && obj.rows.length){
      posRows = obj.rows;
      posMeta = { date: obj.date, count: obj.count, branchId: obj.branchId };
      try { localStorage.setItem(POS_CACHE_KEY(branch), JSON.stringify(obj)); } catch(e){}
      updateStat('fresh');
      if (force) toast(`POS 자료 갱신: ${posRows.length}개`, 'ok');
    } else if (!posRows.length){
      stat.textContent = `⚠ ${branchLabel(branch)} POS 자료 없음 — pos-cost-filter 에서 push 필요`;
    }
  } catch (e){
    if (posRows.length){
      stat.textContent += ' (오프라인)';
    } else {
      stat.textContent = `⚠ POS 로드 실패: ${e.message}`;
    }
  }
}
function reloadPos(showToast){ loadPos(true); }

function updateStat(src){
  const stat = document.getElementById('stat');
  const n = posRows.length;
  const m = masterFallback.length;
  const date = posMeta?.date || '?';
  stat.innerHTML = `${branchLabel(branch)} · POS <b>${n}</b> · master <b>${m}</b><br><span style="opacity:.7">${date}${src==='cache'?' (캐시)':''}</span>`;
}

function branchLabel(b){
  return ({ MIAMI:'마이애미', HOLLYWOOD:'할리우드', LASOLAS:'라스올라스', CORAL_SPRINGS:'코럴 스프링스', PEMBROKE_PINES:'펨브로크', WEST_PALM:'웨스트 팜' })[b] || b;
}

async function loadMasterFallback(){
  try {
    const res = await fetch('canva-backup/master.json');
    if (!res.ok) return;
    const data = await res.json();
    masterFallback = (data.products || [])
      .filter(p => p.name && p.name.length >= 4)
      .filter(p => !/^\$?\d+(\.\d+)?$/.test(p.name.trim()))
      .filter(p => !/^(EACH|PER\s*LB|PER\s*EA|EA|LB|OZ|KG)$/i.test(p.name.trim()));
  } catch(e){}
}

function onBranchChange(v){
  branch = v;
  try { localStorage.setItem('km_branch', branch); } catch(e){}
  loadPos();
}

// ============ 세션 동기화 (폰↔PC) ============
function setSyncDot(state){
  const dot = document.getElementById('sync-dot');
  const colors = { off:'#9ca3af', ok:'#10b981', sync:'#f59e0b', err:'#dc2626' };
  dot.style.background = colors[state] || colors.off;
  const titles = { off:'동기화 꺼짐 (세션 키 없음)', ok:'동기화 정상', sync:'동기화 중…', err:'동기화 오류' };
  dot.title = titles[state] || '';
}

function onSessionChange(v){
  const norm = (v || '').trim().toUpperCase().replace(/[^A-Z0-9_-]/g, '-').slice(0, 40);
  session = norm;
  document.getElementById('session').value = norm;
  try { localStorage.setItem('km-tag-session', norm); } catch(e){}
  if (pollTimer){ clearInterval(pollTimer); pollTimer = null; }
  if (!session){ setSyncDot('off'); return; }
  setSyncDot('sync');
  // 1) 원격에서 먼저 받아서 로컬과 병합 (원격이 더 최신이면 적용)
  pullSession().then(() => {
    // 2) 로컬에 뭐가 있으면 푸시
    if (tags.length) schedulePush();
    // 3) 폴링 시작 (2초)
    pollTimer = setInterval(pullSession, 2000);
  });
}

async function pullSession(){
  if (!session) return;
  try {
    const res = await fetch(SESSION_URL(session));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const obj = await res.json();
    if (!obj || !obj.ts){
      // 원격 비어있음 — 로컬이 우리 거면 그대로
      setSyncDot('ok');
      return;
    }
    // 우리가 방금 푸시한 거랑 같으면 무시 (echo)
    if (obj.deviceId === DEVICE_ID && obj.ts === lastPushTs){
      lastSeenTs = obj.ts;
      setSyncDot('ok');
      return;
    }
    // 원격이 더 최신이면 적용
    if (obj.ts > lastSeenTs){
      tags = Array.isArray(obj.tags) ? obj.tags : [];
      pageCount = obj.pageCount || Math.max(1, Math.ceil(tags.length / PER_PAGE[currentSize]));
      if (obj.currentSize && obj.currentSize !== currentSize){
        currentSize = obj.currentSize;
        const inp = document.querySelector(`#sizes input[value=${currentSize}]`);
        if (inp){
          inp.checked = true;
          document.querySelectorAll('#sizes label').forEach(l => l.dataset.active = '0');
          inp.parentElement.dataset.active = '1';
        }
      }
      lastSeenTs = obj.ts;
      render();
      saveLocal();
      setSyncDot('ok');
    } else {
      setSyncDot('ok');
    }
  } catch(e){
    setSyncDot('err');
  }
}

function schedulePush(){
  if (!session) return;
  setSyncDot('sync');
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushSession, 400);
}

async function pushSession(){
  if (!session) return;
  const ts = Date.now();
  const payload = { ts, deviceId: DEVICE_ID, tags, pageCount, currentSize, branch };
  try {
    const res = await fetch(SESSION_URL(session), {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    lastPushTs = ts;
    lastSeenTs = ts;
    setSyncDot('ok');
  } catch(e){
    setSyncDot('err');
  }
}

function showQR(){
  if (!session){
    onSessionChange(autoSessionKey());
  }
  const url = location.href.split('?')[0] + '?session=' + encodeURIComponent(session) + (branch ? '&branch=' + branch : '');
  document.getElementById('qr-url').textContent = url;
  document.getElementById('qr-session').textContent = session;
  // QR 코드 (구글 차트 API)
  document.getElementById('qr-target').innerHTML =
    `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}" width="200" height="200" alt="QR" style="border:1px solid #e5e7eb;border-radius:6px">`;
  document.getElementById('qr-modal').style.display = 'flex';
}
function closeQR(e){
  if (e && e.target.id !== 'qr-modal' && e.type === 'click') return;
  document.getElementById('qr-modal').style.display = 'none';
}

function autoSessionKey(){
  const today = new Date();
  const ymd = today.getFullYear().toString().slice(-2) +
              String(today.getMonth()+1).padStart(2,'0') +
              String(today.getDate()).padStart(2,'0');
  const b = (branch || 'X').slice(0, 4);
  return `${b}-${ymd}`;
}

// ============ 검색 ============
const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('results');
let searchTimer;
searchEl.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 100);
});
searchEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){
    const first = resultsEl.querySelector('.result-item');
    if (first) first.click();
  }
});

function doSearch(){
  const q = searchEl.value.trim().toLowerCase();
  if (!q || q.length < 2){
    resultsEl.innerHTML = '<div class="result-empty">2글자 이상 입력하거나 📷 스캔하세요</div>';
    return;
  }
  // 바코드 (전부 숫자) 검색은 정확 매치 우선
  const isBarcode = /^\d{6,}$/.test(q);
  let posMatches = [];
  if (posRows.length){
    posMatches = posRows.filter(r => {
      const code = (r.CODE || '').toLowerCase();
      const fb = (r.FULL_BARCODE || '').toLowerCase();
      const item = (r.ITEM_NUMBER || '').toLowerCase();
      const name = (r.NAME || '').toLowerCase();
      const vc = (r.VENDOR_CODE || '').toLowerCase();
      if (isBarcode){
        return code.includes(q) || fb.includes(q) || item.includes(q) || vc.includes(q);
      }
      return name.includes(q) || code.includes(q) || item.includes(q);
    }).slice(0, 40);
  }
  let masterMatches = [];
  if (!isBarcode && masterFallback.length){
    masterMatches = masterFallback
      .filter(p => p.norm && p.norm.includes(q))
      .slice(0, 15);
  }
  if (!posMatches.length && !masterMatches.length){
    resultsEl.innerHTML = '<div class="result-empty">검색 결과 없음</div>';
    return;
  }
  let html = '';
  if (posMatches.length){
    html += posMatches.map(r => renderResultPos(r)).join('');
  }
  if (masterMatches.length){
    html += '<div style="padding:6px 9px;background:#f3f4f6;font-size:10px;color:#6b7280;font-weight:600">CANVA MASTER (참고용)</div>';
    html += masterMatches.map(p => renderResultMaster(p)).join('');
  }
  resultsEl.innerHTML = html;
}

function renderResultPos(r){
  const code = r.CODE || r.FULL_BARCODE || r.ITEM_NUMBER || '';
  const data = encodeURIComponent(JSON.stringify({
    name: r.NAME, code: code, vendor: r.VENDOR, price: r.PRICE,
    barcode: r.FULL_BARCODE || r.CODE, item: r.ITEM_NUMBER, vc: r.VENDOR_CODE
  }));
  return `
    <div class="result-item" onclick='pickPos(decodeURIComponent("${data}"))'>
      <div class="top">${escapeHtml(r.NAME || '(이름 없음)')}</div>
      <div class="meta">
        ${code ? `<span>📌 ${escapeHtml(code)}</span>` : ''}
        ${r.VENDOR ? `<span>🏷 ${escapeHtml(r.VENDOR)}</span>` : ''}
        ${r.PRICE ? `<span class="price">$${(+r.PRICE).toFixed(2)}</span>` : ''}
        ${r.STOCK !== undefined ? `<span style="color:${r.STOCK>0?'#10b981':'#dc2626'}">재고 ${r.STOCK}</span>` : ''}
      </div>
    </div>
  `;
}
function renderResultMaster(p){
  const data = encodeURIComponent(JSON.stringify({ name: p.name }));
  return `
    <div class="result-item" onclick='pickMaster(decodeURIComponent("${data}"))'>
      <div class="top">${escapeHtml(p.name)}</div>
      <div class="meta"><span>📐 디자인 ${p.appears_in}개</span></div>
    </div>
  `;
}

function pickPos(json){
  const r = JSON.parse(json);
  document.getElementById('f-name').value = r.name || '';
  document.getElementById('f-brand').value = r.vendor || '';
  document.getElementById('f-code').value = r.code || '';
  if (r.price && !document.getElementById('f-price').value){
    document.getElementById('f-price').value = r.price;
  }
  document.getElementById('f-price').focus();
  document.getElementById('f-price').select();
  resultsEl.innerHTML = '<div class="result-empty">가격 입력 후 추가 →</div>';
  searchEl.value = '';
  updateLivePreview();
}
function pickMaster(json){
  const r = JSON.parse(json);
  document.getElementById('f-name').value = r.name || '';
  document.getElementById('f-price').focus();
  resultsEl.innerHTML = '<div class="result-empty">가격 입력 후 추가 →</div>';
  searchEl.value = '';
  updateLivePreview();
}

// ============ 바코드 스캐너 ============
let SCANNER = null;
let lastScan = { code: '', t: 0 };

async function toggleScan(){
  const btn = document.getElementById('scan-btn');
  const area = document.getElementById('scan-area');
  if (SCANNER){
    await stopScan();
    btn.classList.remove('scanning');
    area.classList.remove('on');
    return;
  }
  area.classList.add('on');
  btn.classList.add('scanning');
  try {
    SCANNER = new Html5Qrcode('qrReader', { verbose: false });
    const cams = await Html5Qrcode.getCameras();
    if (!cams.length) throw new Error('카메라 없음');
    // 후방 카메라 우선
    const back = cams.find(c => /back|rear|environment/i.test(c.label)) || cams[cams.length - 1];
    await SCANNER.start(
      back.id,
      { fps: 10, qrbox: { width: 280, height: 120 } },
      onScanSuccess,
      () => {}
    );
  } catch (e){
    toast('스캐너 시작 실패: ' + e.message, 'err');
    btn.classList.remove('scanning');
    area.classList.remove('on');
    SCANNER = null;
  }
}
async function stopScan(){
  if (!SCANNER) return;
  try { await SCANNER.stop(); await SCANNER.clear(); } catch(e){}
  SCANNER = null;
}
function onScanSuccess(decodedText){
  const now = Date.now();
  // 같은 바코드 1.5초 잠금 (한 박스 들고있어도 누적 방지)
  if (decodedText === lastScan.code && now - lastScan.t < 1500) return;
  lastScan = { code: decodedText, t: now };
  navigator.vibrate?.(100);
  // POS 에서 정확 매치 찾기
  const found = posRows.find(r => {
    const code = (r.CODE || '').replace(/[^0-9]/g, '');
    const fb = (r.FULL_BARCODE || '').replace(/[^0-9]/g, '');
    const item = (r.ITEM_NUMBER || '');
    const scan = decodedText.replace(/[^0-9]/g, '');
    return code === scan || fb === scan || item === decodedText
        || code.endsWith(scan) || fb.endsWith(scan)  // ITF-14 prefix 0 처리
        || (scan.length > 6 && (code.endsWith(scan.slice(0,-1)) || fb.endsWith(scan.slice(0,-1))));
  });
  if (found){
    toast(`✓ ${found.NAME}`, 'ok', 2000);
    pickPos(JSON.stringify({
      name: found.NAME,
      code: found.CODE || found.FULL_BARCODE || decodedText,
      vendor: found.VENDOR,
      price: found.PRICE,
      barcode: found.FULL_BARCODE || found.CODE,
      item: found.ITEM_NUMBER
    }));
  } else {
    // POS 에 없으면 바코드만 채우고 사용자 입력 유도
    document.getElementById('f-code').value = decodedText;
    searchEl.value = decodedText;
    doSearch();
    toast(`POS 미등록: ${decodedText} — 직접 입력`, 'err', 2500);
  }
}

// ============ 템플릿 / 사이즈 라디오 ============
document.querySelectorAll('#tpls input[name=tpl]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('#tpls label').forEach(l => l.dataset.active = '0');
    r.parentElement.dataset.active = '1';
  });
});
document.querySelectorAll('#sizes input[name=size]').forEach(r => {
  r.addEventListener('change', () => {
    document.querySelectorAll('#sizes label').forEach(l => l.dataset.active = '0');
    r.parentElement.dataset.active = '1';

    pageCount = Math.max(1, Math.ceil(tags.length / PER_PAGE[currentSize]));

    saveAuto();
  });
});

// ============ 태그 추가/삭제 ============
function addTag(){
  const name = document.getElementById('f-name').value.trim();
  const price = document.getElementById('f-price').value.trim();
  if (!name){ toast('상품명을 입력하세요', 'err'); return; }
  if (!price){ toast('가격을 입력하세요', 'err'); return; }
  const tpl = document.querySelector('#tpls input[name=tpl]:checked').value;
  tags.push({
    id: Date.now() + Math.random(),
    name,
    nameKo: document.getElementById('f-name-ko').value.trim(),
    brand: document.getElementById('f-brand').value.trim(),
    size: document.getElementById('f-size').value.trim(),
    price,
    priceOld: document.getElementById('f-price-old').value.trim(),
    code: document.getElementById('f-code').value.trim(),
    tpl,
    img: DRAFT_IMG
  });
  while (Math.ceil(tags.length / PER_PAGE[currentSize]) > pageCount) pageCount++;
  ['f-name','f-name-ko','f-price','f-price-old','f-code'].forEach(id => document.getElementById(id).value = '');
  DRAFT_IMG = null;
  document.getElementById('f-img-clear').style.display = 'none';
  searchEl.value = '';
  searchEl.focus();
  resultsEl.innerHTML = '<div class="result-empty">2글자 이상 입력하거나 📷 스캔하세요</div>';
  updateLivePreview();
  render();
  saveAuto();
  toast(`+ 추가됨 (${tags.length}개)`, 'ok', 1500);
}

document.getElementById('add-btn').addEventListener('keydown', e => { if (e.key === 'Enter') addTag(); });
// Form 안에서 Enter 누르면 추가, 입력할 때마다 미리보기 갱신
['f-price','f-price-old','f-code','f-size','f-brand','f-name-ko','f-name'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); addTag(); }
  });
  el.addEventListener('input', updateLivePreview);
});
document.querySelectorAll('#tpls input[name=tpl]').forEach(r => r.addEventListener('change', updateLivePreview));
document.querySelectorAll('#sizes input[name=size]').forEach(r => r.addEventListener('change', updateLivePreview));

let DRAFT_IMG = null;  // 현재 입력 중인 이미지 dataURL

function getDraftTag(){
  return {
    id: 'draft',
    name: document.getElementById('f-name').value.trim(),
    nameKo: document.getElementById('f-name-ko').value.trim(),
    brand: document.getElementById('f-brand').value.trim(),
    size: document.getElementById('f-size').value.trim(),
    price: document.getElementById('f-price').value.trim(),
    priceOld: document.getElementById('f-price-old').value.trim(),
    code: document.getElementById('f-code').value.trim(),
    tpl: document.querySelector('#tpls input[name=tpl]:checked')?.value || 'regular',
    img: DRAFT_IMG
  };
}

// 사이즈별 실제 인쇄 셀 mm (A4 210x297, 10mm 패딩, 4mm gap 고려)
const CELL_MM = {
  xs: { w: 60, h: 36 },    // 21-up 3x7
  s:  { w: 92, h: 67 },    // 8-up 2x4
  m:  { w: 92, h: 137 },   // 4-up 2x2
  l:  { w: 190, h: 137 },  // 2-up 1x2
  xl: { w: 190, h: 277 }   // 1-up
};

function updateLivePreview(){
  const t = getDraftTag();
  const wrap = document.getElementById('live-preview');
  const status = document.getElementById('live-status');
  if (!t.name && !t.price && !t.img){
    wrap.innerHTML = '<span style="color:#9ca3af;font-size:12px">대기 중…</span>';
    status.textContent = '이름과 가격을 입력하면 보여요';
    return;
  }
  if (!t.name){ status.textContent = '⚠ 이름 입력 필요'; }
  else if (!t.price){ status.textContent = '⚠ 가격 입력 필요'; }
  else { status.textContent = '✓ 추가 가능 — Enter 또는 ＋ 버튼'; }

  // 실제 mm 사이즈로 렌더 (size-* 클래스의 폰트/패딩 그대로 적용 받음)
  const cell = CELL_MM[currentSize];
  // 컨테이너 폭에 맞게 자동 축소 (mm → px 환산)
  const containerW = wrap.clientWidth - 24;  // 패딩 빼고
  const cellPxW = cell.w * 3.7795275591;  // 1mm ≈ 3.78px @ 96dpi
  const scale = Math.min(1, containerW / cellPxW);
  wrap.innerHTML = `
    <div class="size-${currentSize}" style="display:flex;justify-content:center;width:100%">
      <div style="
        width:${cell.w}mm;height:${cell.h}mm;
        transform:scale(${scale});transform-origin:top center;
        margin-bottom:${cell.h * (1 - scale) * -3.78}px;
      ">
        ${renderTag(t)}
      </div>
    </div>
  `;
}

// ============ 이미지 처리 ============
async function handleImageFile(e){
  const f = e.target.files[0];
  if (!f) return;
  e.target.value = '';  // reset so same file can be picked again
  try {
    DRAFT_IMG = await compressImage(f);
    document.getElementById('f-img-clear').style.display = 'inline-block';
    updateLivePreview();
    toast('이미지 추가됨', 'ok', 1500);
  } catch (err){
    toast('이미지 처리 실패: ' + err.message, 'err');
  }
}

function compressImage(file, maxDim = 600, quality = 0.78){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxDim || h > maxDim){
          const ratio = Math.min(maxDim / w, maxDim / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = r.result;
    };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function clearImage(){
  DRAFT_IMG = null;
  document.getElementById('f-img-clear').style.display = 'none';
  updateLivePreview();
}

async function pasteImageUrl(){
  const url = prompt('이미지 URL 또는 image/* data URL 붙여넣기:');
  if (!url) return;
  try {
    if (url.startsWith('data:image/')){
      DRAFT_IMG = url;
    } else {
      const res = await fetch(url, { mode: 'cors' });
      const blob = await res.blob();
      DRAFT_IMG = await compressImage(blob);
    }
    document.getElementById('f-img-clear').style.display = 'inline-block';
    updateLivePreview();
    toast('이미지 추가됨', 'ok', 1500);
  } catch (e){
    toast('이미지 가져오기 실패 (CORS 차단 가능). 파일로 저장 후 📁 버튼 사용', 'err', 4000);
  }
}

// 클립보드에서 이미지 붙여넣기 (Ctrl+V)
document.addEventListener('paste', async (e) => {
  // form 안에 포커스 있을 때만
  if (!document.activeElement.closest('section.panel')) return;
  for (const item of e.clipboardData.items){
    if (item.type.startsWith('image/')){
      e.preventDefault();
      try {
        DRAFT_IMG = await compressImage(item.getAsFile());
        document.getElementById('f-img-clear').style.display = 'inline-block';
        updateLivePreview();
        toast('클립보드 이미지 붙여넣음', 'ok', 1500);
      } catch(err){ toast('붙여넣기 실패: ' + err.message, 'err'); }
      return;
    }
  }
});

function removeTag(id){
  tags = tags.filter(t => t.id != id);
  render();
  saveAuto();
}
function clearAll(){
  tags = []; pageCount = 1;
  render(); saveAuto();
}
function addPage(){ pageCount++; render(); }
function compactPages(){
  pageCount = Math.max(1, Math.ceil(tags.length / PER_PAGE[currentSize]));
  render();
}

// ============ 렌더 ============
function render(){
  const pagesEl = document.getElementById('pages');
  const per = PER_PAGE[currentSize];
  let html = '';
  for (let p = 0; p < pageCount; p++){
    html += `<div class="page size-${currentSize}">`;
    for (let i = 0; i < per; i++){
      const idx = p * per + i;
      const tag = tags[idx];
      html += tag ? renderTag(tag) : '<div class="empty-slot">빈 슬롯</div>';
    }
    html += '</div>';
  }
  pagesEl.innerHTML = html;
  document.getElementById('count').textContent = `${tags.length}개 / ${pageCount} 페이지 (${per}↑)`;
}

function renderTag(t){
  const cls = t.tpl === 'sale' ? 'sale' : t.tpl === 'new' ? 'neww' : t.tpl === 'member' ? 'member' : '';
  const tagCls = `tag ${cls}`.trim();
  const removeBtn = t.id === 'draft' ? '' : `<button class="remove" onclick="removeTag(${t.id})" title="삭제">×</button>`;
  const imgInner = t.img
    ? `<img src="${t.img}" alt="">`
    : (t.id === 'draft'
        ? `<span>📷<br>이미지<br>추가</span>`
        : `<span>📷<br>이미지<br>없음</span>`);
  const imgClick = t.id === 'draft' ? `onclick="document.getElementById('f-img-file').click()"` : '';
  const imgClass = t.img ? 'img-box has' : 'img-box';
  const oldPriceShow = t.priceOld && (t.tpl === 'sale' || t.tpl === 'member');
  return `
    <div class="${tagCls}">
      ${removeBtn}
      <div class="${imgClass}" ${imgClick}>
        <div class="store-mark"><img src="images/_brand/kimchi_logo.png" alt="KIMCHI" onerror="this.parentElement.style.display='none'"></div>
        ${imgInner}
      </div>
      ${t.brand ? `<div class="brand">${escapeHtml(t.brand)}</div>` : '<div class="brand" style="visibility:hidden">-</div>'}
      <div class="name">${escapeHtml(t.name || '')}${t.nameKo ? `<div class="name-ko">${escapeHtml(t.nameKo)}</div>` : ''}</div>
      <div class="meta">
        ${t.size ? `<div class="size-txt">${escapeHtml(t.size)}</div>` : ''}
        <div class="price-block">
          ${oldPriceShow ? `<span class="price-old">$${escapeHtml(t.priceOld)}</span>` : ''}
          <span class="price">$${escapeHtml(t.price || '0.00')}</span>
          <span class="each">EACH</span>
        </div>
      </div>
      ${t.code ? `<div class="code">#${escapeHtml(t.code)}</div>` : ''}
    </div>
  `;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ 저장/불러오기 ============
function saveLocal(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tags, pageCount, currentSize })); } catch(e){}
}
function saveAuto(){
  saveLocal();
  if (session) schedulePush();
}
function exportTags(){
  const blob = new Blob([JSON.stringify({ tags, pageCount, currentSize }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kimchi-price-tags-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function loadTags(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        tags = d.tags || [];
        pageCount = d.pageCount || 1;
        currentSize = d.currentSize || 's';
        document.querySelector(`#sizes input[value=${currentSize}]`).checked = true;
        document.querySelectorAll('#sizes label').forEach(l => l.dataset.active = '0');
        document.querySelector(`#sizes input[value=${currentSize}]`).parentElement.dataset.active = '1';
        render(); saveAuto();
      } catch(e){ toast('파일 읽기 실패: ' + e.message, 'err'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function restoreAuto(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const d = JSON.parse(raw);
      tags = d.tags || [];
      pageCount = d.pageCount || 1;
      currentSize = d.currentSize || 's';
    }
  } catch(e){}
  try { branch = localStorage.getItem('km_branch') || ''; } catch(e){}
  try { session = localStorage.getItem('km-tag-session') || ''; } catch(e){}
  // URL 파라미터 우선 (QR로 들어왔을 때)
  const params = new URLSearchParams(location.search);
  if (params.get('session')) session = params.get('session');
  if (params.get('branch')) branch = params.get('branch');
}

// ============ 시작 ============
restoreAuto();
if (branch){
  document.getElementById('branch').value = branch;
}
if (session){
  document.getElementById('session').value = session;
}
document.querySelector(`#sizes input[value=${currentSize}]`).checked = true;
document.querySelectorAll('#sizes label').forEach(l => l.dataset.active = '0');
const initSize = document.querySelector(`#sizes input[value=${currentSize}]`);
if (initSize) initSize.parentElement.dataset.active = '1';
render();
updateLivePreview();
loadMasterFallback().then(() => {
  if (branch) loadPos();
  else document.getElementById('stat').textContent = '⚠ 지점을 선택하면 POS 자료 자동 로드';
});
if (session){
  // 약간 지연 후 동기화 시작 (POS 로드와 경합 방지)
  setTimeout(() => onSessionChange(session), 500);
} else {
  setSyncDot('off');
}

// 페이지 떠날 때 스캐너 정리
window.addEventListener('beforeunload', () => stopScan());
</script>
