<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>김치마트 주문 - Wismettac</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --red:#C8352A; --red-dk:#A02820; --red-lt:#E8453A;
    --bg:#F5F5F7; --card:#fff; --text:#1a1a1a; --mute:#888; --border:#E0E0E0;
    --green:#2E7D32; --yellow:#F57F17; --blue:#1565C0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

  /* HEADER */
  .hdr{background:linear-gradient(135deg,var(--red) 0%,var(--red-dk) 100%);color:#fff;padding:12px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px}
  .back-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;flex-shrink:0}
  .hdr-title{flex:1;text-align:center}
  .hdr-title h1{font-size:20px;font-weight:800;letter-spacing:-0.3px}
  .hdr-title p{font-size:11px;opacity:.8;margin-top:1px}
  .hdr-acts{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .lang-sel{display:flex;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
  .lang-sel button{background:none;border:none;color:#fff;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;opacity:.6;font-family:inherit}
  .lang-sel button.on{background:rgba(255,255,255,.35);opacity:1}
  .cart-btn{position:relative;background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:8px;font-size:18px;cursor:pointer}
  .cart-badge{position:absolute;top:-6px;right:-6px;background:#fff;color:var(--red);border-radius:12px;font-size:10px;font-weight:800;min-width:18px;height:18px;line-height:18px;padding:0 5px;border:2px solid var(--red)}

  .groups{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid #eee;white-space:nowrap;position:sticky;top:58px;z-index:91}
  .groups::-webkit-scrollbar{display:none}
  .gtab{background:#fff;border:1.5px solid #ddd;color:#444;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;transition:all .15s}
  .gtab.on{background:var(--red);color:#fff;border-color:var(--red)}
  .gtab.new-tab{background:#fff8e1;border-color:#ffb300;color:#e65100}
  .gtab.new-tab.on{background:#ff9800;color:#fff;border-color:#ff9800}

  .cbar{padding:8px 14px;background:#fafafa;border-bottom:1px solid #eee;display:flex;gap:8px;align-items:center;position:sticky;top:104px;z-index:90}
  .cbar select{flex:1;min-width:0;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px;background:#fff;font-family:inherit;outline:none}
  .cbar select:focus{border-color:var(--red)}

  .sbar{padding:8px 14px;background:#fafafa;border-bottom:1px solid #eee;position:sticky;top:149px;z-index:89}
  .sbox{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:22px;font-size:14px;outline:none;font-family:inherit;background:#fff}
  .sbox:focus{border-color:var(--red)}

  .stats{padding:6px 14px;font-size:11px;color:var(--mute);background:#f0f0f2;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
  .stats .clear-flt{background:none;border:none;color:var(--red);font-size:11px;font-weight:700;cursor:pointer;text-decoration:underline;font-family:inherit}

  /* PRODUCT GRID */
  .grid{padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .card{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;flex-direction:column;position:relative;transition:all .15s;cursor:pointer}
  .card:active{transform:scale(0.98)}
  .card.has-qty{box-shadow:0 0 0 2px var(--red),0 1px 3px rgba(0,0,0,.08)}
  .card .new-badge{position:absolute;top:6px;left:6px;background:#ff9800;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;z-index:2;letter-spacing:.3px}
  .pimg{width:100%;aspect-ratio:1;object-fit:contain;background:#fafafa;padding:6px}
  .pbody{padding:7px 9px 8px;display:flex;flex-direction:column;flex:1}
  .pname{font-size:11.5px;font-weight:700;line-height:1.3;color:#222;margin-bottom:3px;min-height:30px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pmeta{font-size:10px;color:#888;margin-bottom:3px;line-height:1.3}
  .pmeta .code{color:var(--red);font-weight:700}
  .pbrand{font-size:9.5px;color:#aaa;margin-bottom:6px;text-transform:uppercase}
  .qrow{display:flex;align-items:center;justify-content:space-between;margin-top:auto;background:#f5f5f5;border-radius:7px;padding:2px}
  .qbtn{flex-shrink:0;width:30px;height:28px;border:none;border-radius:5px;background:#fff;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center}
  .qbtn.minus{color:#E53935}
  .qbtn.plus{color:var(--green)}
  .qbtn:disabled{opacity:.3;cursor:not-allowed}
  .qbtn:active{background:#ddd}
  .qnum{flex:1;text-align:center;font-size:13px;font-weight:800;color:#222;min-width:30px}

  /* CART BAR */
  .cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--red);color:#fff;padding:11px 16px;display:none;justify-content:space-between;align-items:center;box-shadow:0 -2px 12px rgba(0,0,0,.2);cursor:pointer;z-index:95}
  .cart-bar.show{display:flex}
  .cart-bar .info{font-size:13px;font-weight:600}
  .cart-bar .cta{font-size:13px;font-weight:700;background:#fff;color:var(--red);border:none;border-radius:8px;padding:8px 14px;font-family:inherit;cursor:pointer}

  /* MODAL BASE */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center}
  .modal.show{display:flex}
  .modal-box{background:#fff;width:100%;max-width:520px;max-height:92vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-hdr{padding:14px 16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
  .modal-hdr h2{font-size:16px;color:var(--red);font-weight:800}
  .modal-hdr .close{background:none;border:none;font-size:22px;color:#888;cursor:pointer;padding:0 4px}
  .modal-body{flex:1;overflow-y:auto}

  /* CART MODAL */
  .cart-body-inner{padding:6px 14px}
  .ci{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
  .ci:last-child{border-bottom:none}
  .ci img{width:46px;height:46px;object-fit:contain;background:#fafafa;border-radius:6px;flex-shrink:0}
  .ci-info{flex:1;min-width:0}
  .ci-name{font-size:11.5px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
  .ci-meta{font-size:9.5px;color:#888}
  .ci-qrow{display:flex;align-items:center;gap:3px;flex-shrink:0}
  .ci-qrow button{width:26px;height:26px;border:1px solid #ddd;background:#fff;border-radius:5px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
  .ci-qrow input{width:42px;height:26px;border:1px solid #ddd;border-radius:5px;text-align:center;font-size:12px;font-weight:700;font-family:inherit;outline:none}
  .modal-foot{padding:12px 14px;border-top:1px solid #eee;background:#fafafa}
  .summary{display:flex;justify-content:space-between;font-size:12px;margin-bottom:9px;color:#444}
  .summary b{color:var(--red);font-size:14px}
  .btns{display:flex;gap:6px}
  .btns button{flex:1;border:none;border-radius:8px;padding:10px 6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .btns .primary{background:var(--red);color:#fff}
  .btns .outline{background:#fff;color:var(--red);border:1.5px solid var(--red)}
  .btns .gray{background:#eee;color:#555}

  /* PRODUCT DETAIL MODAL */
  .pd-img-wrap{width:100%;padding:16px;background:#fafafa;text-align:center}
  .pd-img{max-width:100%;max-height:240px;object-fit:contain}
  .pd-info{padding:14px 16px}
  .pd-name{font-size:17px;font-weight:800;color:#222;line-height:1.3;margin-bottom:6px}
  .pd-new{display:inline-block;background:#ff9800;color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:12px;margin-left:8px;vertical-align:middle;letter-spacing:.3px}
  .pd-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
  .pd-table td{padding:9px 10px;border:1px solid #e5e5e5;vertical-align:top}
  .pd-table td.label{background:#f7f7f7;color:#555;font-weight:600;width:38%;white-space:nowrap}
  .pd-table td.value{background:#fff;color:#222;word-break:break-word}
  .pd-table td.value.code{color:var(--red);font-weight:700;font-family:monospace}
  .pd-table td.value.barcode{font-family:monospace;font-size:13px;letter-spacing:.5px}
  .pd-qty-section{padding:14px 16px;background:#f9f9f9;border-top:1px solid #eee}
  .pd-qty-label{font-size:12px;color:#666;margin-bottom:8px;font-weight:600}
  .pd-qty-row{display:flex;align-items:center;gap:8px}
  .pd-qty-row button{flex-shrink:0;width:42px;height:42px;border:1.5px solid var(--red);background:#fff;color:var(--red);border-radius:8px;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit}
  .pd-qty-row button:active{background:#fee}
  .pd-qty-row input{flex:1;height:42px;border:1.5px solid #ddd;border-radius:8px;text-align:center;font-size:18px;font-weight:800;font-family:inherit;outline:none;color:#222}
  .pd-qty-row input:focus{border-color:var(--red)}
  .pd-foot{padding:12px 14px;background:#fafafa;border-top:1px solid #eee;display:flex;gap:8px}
  .pd-foot button{flex:1;border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .pd-foot .primary{background:var(--red);color:#fff}
  .pd-foot .outline{background:#fff;color:#666;border:1.5px solid #ddd}

  .empty{padding:60px 20px;text-align:center;color:#aaa;font-size:14px;grid-column:1/-1}
  .empty .big{font-size:40px;margin-bottom:8px}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1}

  .hidden{display:none!important}
</style>
</head>
<body>

<div class="hdr">
  <button class="back-btn" onclick="onBack()">←</button>
  <div class="hdr-title">
    <h1>Wismettac</h1>
    <p>위스메탁 · Orlando</p>
  </div>
  <div class="hdr-acts">
    <button id="branch-btn" onclick="openBranchModal()" style="background:rgba(255,255,255,0.22);border:1.5px solid rgba(255,255,255,0.5);color:#fff;border-radius:14px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700">📍 <span id="branch-btn-label">지점</span></button>
    <div class="lang-sel">
      <button class="on" data-lang="ko" onclick="setLang('ko')">KO</button>
      <button data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
</div>

<!-- BRANCH SELECTOR MODAL -->
<div id="branch-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:14px;max-width:420px;width:100%;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.3)">
    <div style="background:linear-gradient(135deg,#C8352A,#A02820);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:16px;font-weight:800">📍 지점 선택</div>
        <div style="font-size:11px;opacity:.85;margin-top:2px">장바구니는 지점별로 실시간 공유됩니다</div>
      </div>
      <button onclick="closeBranchModal()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px">✕</button>
    </div>
    <div style="padding:12px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px" id="branch-grid"></div>
  </div>
</div>

<div class="groups" id="groups"></div>
<div class="cbar"><select id="cat-select" onchange="render()"></select></div>
<div class="sbar"><input class="sbox" id="search" placeholder="제품명·코드·바코드 검색..." oninput="render()"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<div class="cart-bar" id="cart-bar" onclick="openCart()">
  <div class="info"><span id="cart-summary">0 종 · 0 개</span></div>
  <button class="cta">주문 확인 →</button>
</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="modal" id="pd-modal">
  <div class="modal-box">
    <div class="modal-hdr">
      <h2 id="pd-header">제품 상세</h2>
      <button class="close" onclick="closePd()">✕</button>
    </div>
    <div class="modal-body" id="pd-body"></div>
  </div>
</div>

<!-- CART MODAL -->
<div class="modal" id="cart-modal">
  <div class="modal-box">
    <div class="modal-hdr">
      <h2>🛒 주문 내역</h2>
      <button class="close" onclick="closeCart()">✕</button>
    </div>
    <div class="modal-body"><div class="cart-body-inner" id="cart-body"></div></div>
    <div class="modal-foot">
      <div class="summary"><span id="cart-counts-text">-</span></div>
      <div class="btns">
        <button class="gray" onclick="clearCart()">🗑 비우기</button>
        <button class="outline" onclick="exportOrder()">📥 엑셀</button>
        <button class="primary" onclick="copyOrderText()">📋 복사</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

window.KM_W = {
  get CART(){ return CART; },
  applyRemote(obj){

    for (const k of Object.keys(CART)) delete CART[k];
    if (obj && typeof obj === 'object') Object.assign(CART, obj);

function updateBranchLabel(){
  const b = getBranchId();

  if (el) el.textContent = (BRANCH_BY_ID[b] && BRANCH_BY_ID[b].ko) || '지점 선택';

function setBranch(id){
  if (!BRANCH_BY_ID[id]) return;
  try { localStorage.setItem('km_branch', id); } catch(e){}
  updateBranchLabel();
  closeBranchModal();
  // Re-subscribe cart sync to the new branch
  if (typeof window.__wismRefreshSub === 'function') window.__wismRefreshSub();
}
function openBranchModal(){
  const grid = $('branch-grid');
  const cur = getBranchId();
  if (grid){
    grid.innerHTML = BRANCHES.map(b => (
      '<button onclick="setBranch(\''+b.id+'\')" style="background:'+(b.id===cur?'#FFEBEE':'#fff')+';border:1.5px solid '+(b.id===cur?'#C8352A':'#ddd')+';border-radius:10px;padding:14px 10px;font-size:13px;font-weight:700;color:'+(b.id===cur?'#C8352A':'#333')+';cursor:pointer;font-family:inherit;text-align:center">'

  }

}
function closeBranchModal(){
  const m = $('branch-modal'); if (m) m.style.display = 'none';
}

  let newCount = 0;
  PRODUCTS.forEach(p => {
    if (counts[p.group] !== undefined) counts[p.group]++;
    if (p.isNew) newCount++;
  });
  const tabs = [
    '<button class="gtab ' + (CUR_GROUP===''?'on':'') + '" onclick="selGroup(\'\')">' + t('all') + ' (' + PRODUCTS.length + ')</button>',
    '<button class="gtab new-tab ' + (CUR_GROUP==='NEW'?'on':'') + '" onclick="selGroup(\'NEW\')">' + t('new') + ' (' + newCount + ')</button>'
  ];
  groups.forEach(g => {
    tabs.push('<button class="gtab ' + (CUR_GROUP===g?'on':'') + '" onclick="selGroup(\''+g+'\')">' + g + ' (' + counts[g] + ')</button>');
  });
  $('groups').innerHTML = tabs.join('');
}
function selGroup(g){ CUR_GROUP = g; CUR_CAT = ''; buildGroups(); buildCategorySelect(); render(); }

/* -------- CATEGORIES -------- */
function buildCategorySelect(){
  const filtered = PRODUCTS.filter(p => matchesGroup(p));
  const catCounts = {};
  filtered.forEach(p => catCounts[p.category] = (catCounts[p.category]||0)+1);
  const cats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);
  const opts = ['<option value="">'+ t('allCats') +' (' + filtered.length + ')</option>'];
  cats.forEach(([c, n]) => {
    opts.push('<option value="'+esc(c)+'" '+(c===CUR_CAT?'selected':'')+'>'+esc(c)+' ('+n+')</option>');
  });
  $('cat-select').innerHTML = opts.join('');
}
function matchesGroup(p){
  if (!CUR_GROUP) return true;
  if (CUR_GROUP === 'NEW') return p.isNew === 1;
  return p.group === CUR_GROUP;
}

/* -------- RENDER -------- */
function render(){
  CUR_CAT = $('cat-select').value;
  const q = ($('search').value || '').trim().toLowerCase();

  const filtered = PRODUCTS.filter(p => {
    if (!matchesGroup(p)) return false;
    if (CUR_CAT && p.category !== CUR_CAT) return false;
    if (q){
      const hay = (p.name + ' ' + p.id + ' ' + (p.barcode||'') + ' ' + (p.brand||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const hasFilter = CUR_GROUP || CUR_CAT || q;
  $('stats').innerHTML =
    '<span>' + t('items', {n: filtered.length}) + '</span>' +
    (hasFilter ? '<button class="clear-flt" onclick="clearFilters()">' + t('clearFlt') + '</button>' : '');

  if (!filtered.length){
    $('grid').innerHTML = '<div class="empty"><div class="big">🔍</div>' + t('noResults') + '</div>';
    updateCartBar();
    return;
  }

  $('grid').innerHTML = filtered.map(p => {
    const qty = CART[p.detailId] || 0;
    const pack = parsePackSize(p.packSize);
    const eaQty = pack ? (CART[eaIdOf(p.detailId)] || 0) : 0;
    const anyQty = qty > 0 || eaQty > 0;
    const eaStep = pack ? pack.pack : 1;
    const eaRow = pack ? (
      '<div class="qrow" onclick="event.stopPropagation()" style="margin-top:4px;background:#fff4e0;border-radius:8px;padding:2px">' +
        '<button class="qbtn minus" onclick="bumpQty(\''+eaIdOf(p.detailId)+'\',-' + eaStep + ')"' + (eaQty<=0?' disabled':'') + '>−</button>' +
        '<span class="qnum">' + eaQty + '</span>' +
        '<button class="qbtn plus" onclick="bumpQty(\''+eaIdOf(p.detailId)+'\',' + eaStep + ')">+</button>' +
      '</div>' +
      '<div style="font-size:9.5px;color:#b87500;text-align:center;margin-top:2px;font-weight:600">낱개 ea · 한 번 + = ' + eaStep + '개 (1 CS)</div>'
    ) : '';
    return (
      '<div class="card ' + (anyQty?'has-qty':'') + '" onclick="openPd(\''+p.detailId+'\')">' +
        (p.isNew ? '<span class="new-badge">NEW</span>' : '') +
        '<img class="pimg" src="' + esc(p.image) + '" loading="lazy" onerror="this.style.visibility=\'hidden\';this.style.background=\'#f0f0f0\'">' +
        '<div class="pbody">' +
          '<div class="pname" title="' + esc(p.name) + '">' + esc(p.name) + '</div>' +
          '<div class="pmeta"><span class="code">#' + esc(p.id) + '</span> · ' + esc(p.packSize||'-') + '</div>' +
          (p.brand ? '<div class="pbrand">' + esc(p.brand) + '</div>' : '') +
          '<div class="qrow" onclick="event.stopPropagation()">' +
            '<button class="qbtn minus" onclick="bumpQty(\''+p.detailId+'\',-1)"' + (qty<=0?' disabled':'') + '>−</button>' +
            '<span class="qnum">' + qty + '</span>' +
            '<button class="qbtn plus" onclick="bumpQty(\''+p.detailId+'\',1)">+</button>' +
          '</div>' +
          eaRow +
        '</div>' +
      '</div>'
    );
  }).join('');
  updateCartBar();
}

function clearFilters(){
  CUR_GROUP = ''; CUR_CAT = '';
  $('search').value = '';
  buildGroups(); buildCategorySelect(); render();
}

function bumpQty(id, delta){
  const cur = CART[id] || 0;
  const next = Math.max(0, Math.min(999, cur + delta));
  if (next === 0) delete CART[id];
  else CART[id] = next;
  saveCart();
  render();
  if ($('cart-modal').classList.contains('show')) renderCart();
  if ($('pd-modal').classList.contains('show') && CURRENT_PD_ID === id) {
    const input = $('pd-qty-input');
    if (input) input.value = next;
  }
}
function setQty(id, n){
  const v = Math.max(0, Math.min(999, parseInt(n,10) || 0));
  if (v === 0) delete CART[id];
  else CART[id] = v;
  saveCart();
  render();
  if ($('cart-modal').classList.contains('show')) renderCart();
}

// 3-tier pack sizes like "12/ 15/ 1.76 OZ" support per-ea ordering too.
function parsePackSize(s){
  const m = String(s||'').match(/^\s*(\d+)\s*\/\s*(\d+)\s*\/\s*(.+)$/i);
  if (!m) return null;
  const outer = +m[1], pack = +m[2];
  if (!(outer > 0 && pack > 1)) return null;
  return { outer, pack, unit: m[3].trim() };
}
function eaIdOf(id){ return id + '__EA'; }
function isEaId(id){ return String(id).endsWith('__EA'); }
function baseIdOf(id){ return String(id).replace(/__EA$/, ''); }

function updateCartBar(){
  const types = Object.keys(CART).length;
  const units = Object.values(CART).reduce((s,n)=>s+n, 0);
  $('cart-badge').textContent = units;
  const bar = $('cart-bar');
  if (types > 0){
    bar.classList.add('show');
    $('cart-summary').innerHTML = t('summary', {types, units});
  } else {
    bar.classList.remove('show');
  }
}

/* -------- PRODUCT DETAIL MODAL -------- */
function openPd(detailId){
  const p = BY_ID[detailId];
  if (!p) return;
  CURRENT_PD_ID = detailId;
  const curQty = CART[detailId] || 0;

  const body = $('pd-body');
  body.innerHTML =
    '<div class="pd-img-wrap">' +
      '<img class="pd-img" src="' + esc(p.image) + '" onerror="this.style.visibility=\'hidden\'">' +
    '</div>' +
    '<div class="pd-info">' +
      '<div class="pd-name">' + esc(p.name) + (p.isNew ? '<span class="pd-new">NEW</span>' : '') + '</div>' +
      '<table class="pd-table">' +
        (p.brand ? '<tr><td class="label">' + t('brand') + '</td><td class="value">' + esc(p.brand) + '</td></tr>' : '') +
        (p.category ? '<tr><td class="label">' + t('category') + '</td><td class="value">' + esc(p.category) + '</td></tr>' : '') +
        '<tr><td class="label">' + t('itemNo') + '</td><td class="value code">#' + esc(p.id) + '</td></tr>' +
        (p.packSize ? '<tr><td class="label">' + t('packSize') + '</td><td class="value">' + esc(p.packSize) + '</td></tr>' : '') +
        (p.minOrder ? '<tr><td class="label">' + t('minOrder') + '</td><td class="value">' + esc(p.minOrder) + '</td></tr>' : '') +
        (p.barcode ? '<tr><td class="label">' + t('barcode') + '</td><td class="value barcode">' + esc(p.barcode) + '</td></tr>' : '') +
      '</table>' +
    '</div>' +
    '<div class="pd-qty-section">' +
      '<div class="pd-qty-label">' + t('orderQty') + '</div>' +
      '<div class="pd-qty-row">' +
        '<button onclick="pdBump(-1)">−</button>' +
        '<input type="number" min="0" max="999" id="pd-qty-input" value="' + curQty + '" onchange="pdSetQty(this.value)">' +
        '<button onclick="pdBump(1)">+</button>' +
      '</div>' +
    '</div>' +
    '<div class="pd-foot">' +
      '<button class="outline" onclick="closePd()">' + (LANG==='ko'?'닫기':'Close') + '</button>' +
      (curQty > 0
        ? '<button class="primary" onclick="pdRemove()">' + t('removeCart') + '</button>'
        : '<button class="primary" onclick="pdAddToCart()">+ ' + t('addCart') + '</button>'
      ) +
    '</div>';

  $('pd-header').textContent = '#' + p.id;
  $('pd-modal').classList.add('show');
}

function closePd(){
  $('pd-modal').classList.remove('show');
  CURRENT_PD_ID = '';
}

function pdBump(delta){
  if (!CURRENT_PD_ID) return;
  const input = $('pd-qty-input');
  const cur = parseInt(input.value, 10) || 0;
  const next = Math.max(0, Math.min(999, cur + delta));
  input.value = next;
}
function pdSetQty(v){
  const input = $('pd-qty-input');
  const n = Math.max(0, Math.min(999, parseInt(v, 10) || 0));
  input.value = n;
}
function pdAddToCart(){
  const input = $('pd-qty-input');
  let n = parseInt(input.value, 10) || 0;
  if (n <= 0) n = 1;
  CART[CURRENT_PD_ID] = n;
  saveCart();
  render();
  toast(t('added'));
  // Refresh modal footer (to show "remove" button now that item is in cart)
  openPd(CURRENT_PD_ID);
}
function pdRemove(){
  if (!CURRENT_PD_ID) return;
  delete CART[CURRENT_PD_ID];
  saveCart();
  render();
  toast(t('removed'));
  closePd();
}

/* -------- CART MODAL -------- */
function openCart(){ renderCart(); $('cart-modal').classList.add('show'); }
function closeCart(){ $('cart-modal').classList.remove('show'); }
function renderCart(){
  const entries = Object.entries(CART);
  const body = $('cart-body');
  if (!entries.length){
    body.innerHTML = '<div class="empty" style="padding:40px 10px"><div class="big">🛒</div>' + t('empty') + '</div>';
    $('cart-counts-text').innerHTML = '';
    return;
  }
  body.innerHTML = entries.map(([id, qty]) => {
    const ea = isEaId(id);
    const lookupId = ea ? baseIdOf(id) : id;
    const p = BY_ID[lookupId];
    if (!p) return '';
    const pack = ea ? parsePackSize(p.packSize) : null;
    const sizeLabel = ea && pack ? ('1 ea (' + pack.unit + ')') : (p.packSize||'-');
    const nameSuffix = ea ? ' (ea)' : '';
    return (
      '<div class="ci" onclick="closeCart();openPd(\''+p.detailId+'\');">' +
        '<img src="' + esc(p.image) + '" onerror="this.style.visibility=\'hidden\'">' +
        '<div class="ci-info">' +
          '<div class="ci-name">' + esc(p.name) + nameSuffix + '</div>' +
          '<div class="ci-meta">#' + esc(p.id) + ' · ' + esc(sizeLabel) + (p.brand?' · ' + esc(p.brand):'') + '</div>' +
        '</div>' +
        '<div class="ci-qrow" onclick="event.stopPropagation()">' +
          '<button onclick="bumpQty(\''+id+'\',-1)">−</button>' +
          '<input type="number" min="0" max="999" value="'+qty+'" onchange="setQty(\''+id+'\', this.value)">' +
          '<button onclick="bumpQty(\''+id+'\',1)">+</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');

  const types = entries.length;
  const units = entries.reduce((s, [,q]) => s + q, 0);
  $('cart-counts-text').innerHTML = t('summary', {types, units});
}

/* -------- EXPORT -------- */
function clearCart(){
  if (!Object.keys(CART).length) return;
  if (!confirm(t('confirmClear'))) return;
  for (const k in CART) delete CART[k];
  saveCart();
  render();
  renderCart();
  toast('✓');
}

function buildOrderText(){
  const entries = Object.entries(CART);
  if (!entries.length) return '';
  const today = new Date().toISOString().slice(0,10);
  const lines = ['[김치마트 주문 - Wismettac Orlando / ' + today + ']', ''];
  entries.forEach(([id, qty]) => {
    const p = BY_ID[id];
    if (!p) return;
    lines.push('#' + p.id + '  ×' + qty + '  ' + p.name + '  (' + (p.packSize||'-') + ')');
  });
  const units = entries.reduce((s, [,q]) => s + q, 0);
  lines.push('', '합계: ' + entries.length + '종 / ' + units + '개');
  return lines.join('\n');
}

function copyOrderText(){
  const txt = buildOrderText();
  if (!txt){ toast(t('noCart')); return; }
  if (navigator.clipboard){
    navigator.clipboard.writeText(txt).then(
      () => toast(t('copied')),
      () => fallbackCopy(txt)
    );
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  const ta = document.createElement('textarea');
  ta.value = txt;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); toast(t('copied')); }
  catch(e){ toast('복사 실패'); }
  document.body.removeChild(ta);
}

function exportOrder(){
  const entries = Object.entries(CART);
  if (!entries.length){ toast(t('noCart')); return; }
  const header = ['ItemCode', 'Product Name', 'Brand', 'Group', 'Category', 'Pack Size', 'Min Order', 'Barcode', 'Order Qty'];
  const rows = entries.map(([id, qty]) => {
    const p = BY_ID[id] || {};
    return [p.id||'', p.name||'', p.brand||'', p.group||'', p.category||'', p.packSize||'', p.minOrder||'', p.barcode||'', qty];
  });
  const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
  ws['!cols'] = [{wch:10},{wch:44},{wch:16},{wch:10},{wch:24},{wch:14},{wch:10},{wch:14},{wch:10}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '주문');
  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'Wismettac_Order_' + today + '.xlsx');
  toast('✓ 엑셀 저장 완료');
}

/* -------- INIT -------- */
setLang(LANG);
$('cart-modal').addEventListener('click', (e) => { if (e.target.id === 'cart-modal') closeCart(); });
$('pd-modal').addEventListener('click', (e) => { if (e.target.id === 'pd-modal') closePd(); });
</script>

<!-- Real-time cart sync per branch (mirrors the main order app) -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyBwL0Wa1Q8aFhZp5hsn9gTw5aZwXUdAVy4",
  authDomain: "kimchi-mart-order.firebaseapp.com",
  databaseURL: "https://kimchi-mart-order-default-rtdb.firebaseio.com",
  projectId: "kimchi-mart-order",
  storageBucket: "kimchi-mart-order.firebasestorage.app",
  messagingSenderId: "640942647201",
  appId: "1:640942647201:web:1e3421fb55c89155230de0"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let applyingRemote = false;
let unsub = null;
function getBranch(){ try { return localStorage.getItem('km_branch') || ''; } catch(e){ return ''; } }
function path(b){ return 'carts/wismettac/' + b; }

window.cloudPushCart = function(cart){
  if (applyingRemote) return;
  const b = getBranch(); if (!b) return;
  const clean = {};
  for (const k in cart){ if (cart[k] > 0) clean[k] = cart[k]; }
  set(ref(db, path(b)), clean).catch(e => console.warn('cart push failed', e));
};

let firstSync = true;
function subscribe(){
  if (unsub){ try { unsub(); } catch(e){} unsub = null; }
  firstSync = true; // reset per-branch
  const b = getBranch(); if (!b) return;
  console.info('[Firebase] Wismettac subscribing to carts/wismettac/' + b);
  unsub = onValue(ref(db, path(b)), (snap) => {
    const remote = snap.val() || {};
    if (firstSync){
      firstSync = false;
      // Protect against data loss on first sync: merge remote + local
      // by keeping the MAX qty per item. This way neither side wipes the
      // other — if a colleague already added items on their phone and
      // this device had its own local items, both are preserved.
      const local = (window.KM_W && window.KM_W.CART) || {};
      const merged = {};
      const keys = new Set([...Object.keys(local), ...Object.keys(remote)]);
      keys.forEach(k => {
        const lq = +local[k] || 0, rq = +remote[k] || 0;
        const mx = Math.max(lq, rq);
        if (mx > 0) merged[k] = mx;
      });
      applyingRemote = true;
      try { if (window.KM_W) window.KM_W.applyRemote(merged); }
      finally { applyingRemote = false; }
      // Push merged back so cloud reflects the union.
      if (JSON.stringify(merged) !== JSON.stringify(remote)){
        set(ref(db, path(b)), merged).catch(e => console.warn('merged push failed', e));
      }
      console.info('[Firebase] first sync merged', Object.keys(merged).length, 'items');
      return;
    }
    // Subsequent updates: remote is authoritative — reflects deliberate edits
    // from other devices (including removals).
    applyingRemote = true;
    try { if (window.KM_W) window.KM_W.applyRemote(remote); }
    finally { applyingRemote = false; }
  }, (err) => console.warn('cart read failed', err));
}
subscribe();
// Exposed hook so the branch selector can re-subscribe after picking a branch.
window.__wismRefreshSub = subscribe;
// Re-subscribe if the user changes branch in another tab.
window.addEventListener('storage', (e) => { if (e.key === 'km_branch') subscribe(); });
console.info('[Firebase] Wismettac cart sync active');
</script>
